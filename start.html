<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>당고 가게</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(180deg,#ffe4ec,#ffd6a5);
  font-family:sans-serif;
}

.container{
  text-align:center;
}

.title{
  font-size:48px;
  margin-bottom:40px;
  animation: float 2s infinite;
}

.btn{
  display:block;
  margin:10px auto;
  padding:15px 30px;
  font-size:18px;
  border:none;
  border-radius:30px;
  background:#ff7aa2;
  color:white;
  cursor:pointer;
  box-shadow:0 5px 0 #cc5c80;
}

.btn:active{
  transform:translateY(2px);
  box-shadow:0 2px 0 #cc5c80;
}

@keyframes float{
  50%{transform:translateY(-10px);}
}
</style>
</head>

<body>

<div class="container">
  <div class="title">🍡 당고 가게</div>

  <div id="buttons"></div>
</div>

<script>
const save = localStorage.getItem('save');

const btns = document.getElementById('buttons');

if(save){
  btns.innerHTML = `
    <button class="btn" onclick="continueGame()">이어하기</button>
    <button class="btn" onclick="newGame()">새로하기</button>
  `;
}else{
  btns.innerHTML = `
    <button class="btn" onclick="newGame()">게임 시작</button>
  `;
}

function newGame(){
  localStorage.setItem('save','yes');
  location.href = 'dango.html';
}

function continueGame(){
  location.href = 'dango.html';
}
</script>

</body>
</html>
