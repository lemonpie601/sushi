<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>당고집</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍡</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<link rel="manifest" href="/sushi/manifest.json">
<meta name="theme-color" content="#5a3018">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="당고집">
<meta name="mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="/sushi/icon.svg">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

/* ════════════════════════ 커스텀 스크롤바 ════════════════════════ */
/* WebKit (Chrome/Safari/Edge) */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{
  background:linear-gradient(180deg,rgba(200,130,60,.5),rgba(160,90,40,.5));
  border-radius:10px;
}
::-webkit-scrollbar-thumb:hover{
  background:linear-gradient(180deg,rgba(200,130,60,.8),rgba(160,90,40,.8));
}
::-webkit-scrollbar-corner{background:transparent;}

/* Firefox */
*{scrollbar-width:thin;scrollbar-color:rgba(200,130,60,.5) transparent;}

/* 어두운 배경(제작대, 모달)용 스크롤바 */
#bench ::-webkit-scrollbar-thumb,
#done-skewers::-webkit-scrollbar-thumb{
  background:linear-gradient(180deg,rgba(255,220,170,.45),rgba(255,200,140,.3));
}
#bench ::-webkit-scrollbar-thumb:hover,
#done-skewers::-webkit-scrollbar-thumb:hover{
  background:linear-gradient(180deg,rgba(255,220,170,.75),rgba(255,200,140,.6));
}
#bench,#bench *{scrollbar-color:rgba(255,220,170,.45) transparent;}
#done-skewers{scrollbar-color:rgba(200,130,60,.4) transparent;}
:root{
  --bg:#fef3e8;
  --pink:#ffb3c6;--pink2:#ff6b9d;--pink3:#c94070;
  --peach:#ffd4a8;--peach2:#ffb36b;--peach3:#e8864a;
  --brown:#7a4528;--brown2:#5a3018;--brown3:#3a1e0a;
  --sage:#a8d48a;--sage2:#6aaa48;--sage3:#3a7a28;
  --sky:#a8d8f0;--sky2:#58a8d8;
  --cream:#fff8f0;--cream2:#ffecd8;--cream3:#ffd8b8;
  --text:#2a1508;--text2:#6a3a18;--text3:#b07848;
  --white:#fffdf8;
  --shadow:rgba(120,60,20,.15);
  --wood:#c8864a;--wood2:#a86030;--wood3:#7a4020;
  --gold:#d4a020;--gold2:#b07810;
}
html,body{height:100%;overflow:hidden;}
body{
  font-family:'Noto Sans KR',sans-serif;
  color:var(--text);
  height:100dvh;
  display:flex;flex-direction:column;
  background:linear-gradient(160deg,#fff0e8 0%,#fde8d8 50%,#f8dcc8 100%);
}

/* 테마별 가게 배경 오버라이드 */
body.theme-sakura #store-bg{background:linear-gradient(180deg,#ffd8e8 0%,#ffc8d8 40%,#ffb8c8 100%)!important;}
body.theme-sakura #sign{background:#7a2040;border-color:#f0a0c0;color:#ffe0f0;}
body.theme-night #store-bg{background:linear-gradient(180deg,#3a3060 0%,#5a4080 40%,#6a4070 100%)!important;}
body.theme-night #sign{background:#1a1030;border-color:#8060c0;color:#e8d8ff;}
body.theme-night #counter-top{background:linear-gradient(180deg,#c0a870,#806040,#403018)!important;}
body.theme-forest #store-bg{background:linear-gradient(180deg,#c8e0b0 0%,#a8c890 40%,#88b070 100%)!important;}
body.theme-forest #sign{background:#2a4018;border-color:#8ac060;color:#e0f8c8;}

/* ════════════════════════ 헤더 ════════════════════════ */
#hdr{
  flex-shrink:0;
  background:linear-gradient(90deg,#7a4528,#5a3018);
  padding:6px 12px 5px;
  display:flex;flex-direction:column;gap:3px;
  box-shadow:0 3px 12px rgba(80,30,10,.35);
  position:relative;overflow:hidden;
}
#hdr::after{
  content:'🍡🌸🍡🌸🍡🌸🍡🌸🍡🌸🍡🌸🍡🌸🍡🌸';
  position:absolute;bottom:-2px;left:0;right:0;
  font-size:10px;letter-spacing:2px;opacity:.15;
  pointer-events:none;overflow:hidden;white-space:nowrap;
}
.hdr-r1{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.hdr-r2{display:flex;align-items:center;justify-content:space-between;gap:5px;}
.hdr-title{
  font-family:'Jua',sans-serif;font-size:17px;
  color:#ffecd8;letter-spacing:.05em;
  text-shadow:0 1px 4px rgba(0,0,0,.3);
}
.hdr-btns{display:flex;gap:4px;}
.hdr-stats{display:flex;gap:5px;flex:1;flex-wrap:wrap;}
.hchip{
  display:flex;align-items:center;gap:3px;
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.25);
  border-radius:20px;padding:2px 8px;
  font-size:11px;color:rgba(255,236,216,.9);
  white-space:nowrap;
}
.hchip b{font-family:'Jua',sans-serif;font-size:12px;color:#ffd4a0;}
#hdr-timer{
  font-family:'Jua',sans-serif;font-size:14px;
  color:#ffecd8;
  background:rgba(255,255,255,.18);
  border:1px solid rgba(255,255,255,.3);
  border-radius:20px;padding:2px 10px;flex-shrink:0;
}
#hdr-timer.urg{color:#ffb3c6;border-color:#ff6b9d;animation:urg .4s ease infinite alternate;}
@keyframes urg{from{opacity:.6}to{opacity:1}}
.hdr-btn{
  width:28px;height:28px;border-radius:50%;
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;cursor:pointer;transition:all .12s;
  position:relative;
}
.hdr-btn:active{background:rgba(255,255,255,.3);}
.hdr-btn .badge{
  position:absolute;top:-3px;right:-3px;
  background:#ff4060;color:#fff;font-size:9px;font-weight:700;
  border-radius:10px;padding:1px 5px;min-width:14px;line-height:1.2;
  box-shadow:0 1px 3px rgba(0,0,0,.3);
  font-family:'Noto Sans KR',sans-serif;
}

/* ════════════════════════ 가게 뷰 ════════════════════════ */
#store{
  flex:1;min-height:0;
  position:relative;overflow:hidden;
}
#store-bg{
  position:absolute;inset:0;
  background:linear-gradient(180deg,#f0c8a0 0%,#e8b888 40%,#e0a870 100%);
  transition:background .4s;
}
#store-bg::before{
  content:'';position:absolute;inset:0 0 50% 0;
  background:repeating-linear-gradient(
    180deg,
    transparent 0,transparent 28px,
    rgba(120,60,20,.06) 28px,rgba(120,60,20,.06) 30px
  );
}
#counter-top{
  position:absolute;bottom:0;left:0;right:0;height:12px;
  background:linear-gradient(180deg,#f0e0a0,#d4a840,#b88020);
  border-top:2px solid #f8f0c0;
  box-shadow:0 -2px 10px rgba(0,0,0,.15);
  z-index:2;
}
#sign{
  position:absolute;top:8px;left:50%;transform:translateX(-50%);
  background:var(--brown3);
  border:2px solid var(--wood);
  border-radius:8px;padding:4px 16px;
  font-family:'Jua',sans-serif;font-size:11px;color:#f8e0a0;
  letter-spacing:.06em;white-space:nowrap;z-index:3;
  box-shadow:0 3px 10px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.1);
  transition:all .3s;
}
#sign::before{
  content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%);
  width:3px;height:8px;background:var(--wood);border-radius:2px;
}
.deco{
  position:absolute;font-size:22px;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.2));
  z-index:2;
}
/* 꾸미기 장식 */
.shop-deco{position:absolute;z-index:2;filter:drop-shadow(0 2px 4px rgba(0,0,0,.25));pointer-events:none;}

#customer-area{
  position:absolute;
  bottom:5px;left:0;right:0;
  display:flex;justify-content:center;align-items:flex-end;
  gap:0px;padding:0 14px;
  z-index:4;
}
#speech-bubble{
  background:var(--white);
  border:2.5px solid var(--cream3);
  border-radius:16px 16px 12px 16px;
  padding:9px 12px;
  max-width:min(210px,58vw);min-width:120px;
  box-shadow:0 4px 16px var(--shadow);
  position:relative;
  align-self:flex-end;
  margin-bottom:40px; margin-left:25px;
  transition:opacity .25s,transform .25s;
}
#speech-bubble.hidden{opacity:0;transform:translateY(8px);pointer-events:none;}
#speech-bubble::after{
  content:'';position:absolute;
  bottom:-13px;right:16px;
  border:6px solid transparent;border-top-color:var(--cream3);
}
#speech-bubble::before{
  content:'';position:absolute;
  bottom:-11px;right:16px;z-index:1;
  border:6px solid transparent;border-top-color:var(--white);
}
#speech-bubble.wait{animation:bfloat 2.5s ease-in-out infinite alternate;}
@keyframes bfloat{from{transform:translateY(0);}to{transform:translateY(-5px);}}
#speech-bubble.happy{background:#edfce8;border-color:#8fcc78;}
#speech-bubble.happy::after{border-top-color:#8fcc78;}
#speech-bubble.happy::before{border-top-color:#edfce8;}
#speech-bubble.angry{background:#fce8ec;border-color:#f09090;}
#speech-bubble.angry::after{border-top-color:#f09090;}
#speech-bubble.angry::before{border-top-color:#fce8ec;}
.bub-title{font-family:'Jua',sans-serif;font-size:13px;color:var(--text);margin-bottom:5px;display:flex;align-items:center;gap:4px;}
.bub-title .diff{font-size:10px;background:var(--gold);color:#fff;padding:1px 6px;border-radius:10px;}
.bub-skewers{display:flex;flex-direction:column;gap:3px;margin-bottom:4px;}
.bub-skewer-row{display:flex;align-items:center;}
.bub-sauce-row{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);}
.bub-sauce-row b{color:var(--brown2);}
.bub-msg{font-size:12px;font-weight:700;text-align:center;padding:2px 0;}

#cust-wrap{display:flex;flex-direction:column;align-items:center;}
#cust-img{
  width:auto;
  height: clamp(120px, 32dvh, 45dvh);
  max-width: 58vw;
  object-fit:contain;object-position:center bottom;
  display:block;
  filter:drop-shadow(0 4px 10px rgba(0,0,0,.25));
  transition:filter .3s;
}
#cust-img.happy{filter:drop-shadow(0 4px 10px rgba(0,0,0,.2)) brightness(1.004) saturate(1.003);}
#cust-img.angry{filter:drop-shadow(0 4px 10px rgba(0,0,0,.2)) saturate(1.008) hue-rotate(-20deg) brightness(.98);}
#cust-img.sad{filter:drop-shadow(0 4px 10px rgba(0,0,0,.2)) saturate(.85) brightness(.95);}
#cust-img.excited{filter:drop-shadow(0 4px 14px rgba(240,140,180,.4)) brightness(1.02) saturate(1.1);animation:excite .6s ease-in-out infinite alternate;}
#cust-img.smile{filter:drop-shadow(0 4px 10px rgba(0,0,0,.2)) brightness(1.01);}
#cust-img.surprise{filter:drop-shadow(0 4px 10px rgba(0,0,0,.2)) brightness(1.05);animation:shake .3s ease-in-out 3;}
#cust-img.shy{filter:drop-shadow(0 4px 10px rgba(0,0,0,.2)) hue-rotate(10deg);}
#cust-img.tired{filter:drop-shadow(0 4px 10px rgba(0,0,0,.2)) saturate(.7) brightness(.92);}
#cust-img.love{filter:drop-shadow(0 4px 14px rgba(240,90,140,.5)) brightness(1.03) saturate(1.08);animation:lovepulse 1s ease-in-out infinite;}
#cust-img.empty{opacity:0;pointer-events:none;}
@keyframes excite{from{transform:translateY(0);}to{transform:translateY(-3px);}}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-4px);}75%{transform:translateX(4px);}}
@keyframes lovepulse{0%,100%{transform:scale(1);}50%{transform:scale(1.02);}}
/* 호감도 뱃지 & VIP */
#aff-badge{
  position:absolute;top:30px;left:12px;z-index:6;
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.94);
  border:2px solid var(--pink2);
  border-radius:16px;
  padding:4px 10px;
  font-family:'Jua',sans-serif;font-size:11px;color:var(--text);
  box-shadow:0 2px 8px rgba(0,0,0,.15);
  transition:all .3s;
}
#aff-badge.hidden{opacity:0;pointer-events:none;transform:translateY(-6px);}
#aff-badge .aff-hearts{color:#e06080;letter-spacing:-1px;}
#aff-badge .aff-lv{font-size:9px;font-weight:700;color:var(--pink3);}
#aff-badge.vip{border-color:var(--gold);background:linear-gradient(135deg,#fff7d8,#ffe8a0);animation:vipglow 1.2s ease-in-out infinite alternate;}
@keyframes vipglow{from{box-shadow:0 2px 8px rgba(0,0,0,.15);}to{box-shadow:0 2px 16px rgba(255,180,40,.6);}}
.aff-bar{
  width:60px;height:4px;background:rgba(0,0,0,.12);
  border-radius:2px;overflow:hidden;
}
.aff-bar>div{
  height:100%;background:linear-gradient(90deg,#f09aac,#e06080);
  transition:width .4s;
}
#cust-tbar-bg{
  width:clamp(100px,28vw,150px);
  height:5px;background:rgba(0,0,0,.12);
  border-radius:3px;overflow:hidden;margin-top:2px;
  transition:opacity .2s;
}
#cust-tbar-bg.empty{opacity:0;}
#cust-tbar{height:5px;border-radius:3px;transition:width .3s,background .3s;background:var(--sage2);}

/* ════════════════════════ 제작 디스플레이 (좌: 완성꼬치 / 중: 현재 제작 / 우: 서빙) ════════════════════════ */
#craft-display{
  flex-shrink:0;height:92px;
  background:linear-gradient(180deg,#fff8f0,#ffecd8);
  border-top:3px solid var(--peach2);
  border-bottom:2px solid var(--cream3);
  position:relative;overflow:hidden;
  box-shadow:0 -2px 8px rgba(200,120,60,.1);
  display:flex;align-items:stretch;
}
#craft-display::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(
    90deg,transparent 0,transparent 40px,
    rgba(200,130,60,.04) 40px,rgba(200,130,60,.04) 41px
  );
  pointer-events:none;
}
/* 좌: 완성된 꼬치 목록 */
#done-skewers{
  flex-shrink:0;
  width:clamp(70px,22vw,95px);
  padding:6px 4px 6px 6px;
  display:flex;flex-direction:column;gap:3px;
  overflow-y:auto;overflow-x:hidden;
  border-right:1.5px dashed rgba(200,130,60,.25);
  position:relative;z-index:1;
}
.done-lbl{
  font-family:'Jua',sans-serif;font-size:9px;
  color:var(--text3);text-align:center;margin-bottom:2px;flex-shrink:0;
  letter-spacing:.03em;
}
.done-sk{
  font-size:13px;line-height:1;
  background:linear-gradient(135deg,#ffecd8,#ffd4b0);
  border:1.5px solid var(--peach2);
  border-radius:8px;padding:3px 5px;
  animation:doneAnim .3s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 1px 3px rgba(200,120,60,.2);
  white-space:nowrap;text-align:center;
  flex-shrink:0;
}
.done-empty{
  font-size:9px;color:var(--text3);text-align:center;
  padding:8px 4px;opacity:.6;line-height:1.4;
}
@keyframes doneAnim{from{transform:scale(0);}to{transform:scale(1);}}
/* 중: 현재 제작 중 꼬치 */
#craft-center{
  flex:1;min-width:0;
  position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:4px;
}
#craft-status{
  font-family:'Jua',sans-serif;font-size:10px;color:var(--text3);
  pointer-events:none;z-index:1;margin-bottom:2px;text-align:center;
  padding:0 4px;
}
#craft-status em{color:var(--pink2);font-style:normal;font-size:11px;}
#craft-stick-wrap{
  position:relative;
  display:flex;align-items:center;
  height:46px;
}
#craft-stick-bg{
  height:8px;border-radius:4px;
  background:linear-gradient(90deg,#f8e890,#d4a030);
  box-shadow:0 2px 6px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.4);
  flex-shrink:0;
  transition:width .15s;
}
#craft-handle{
  width:10px;height:20px;border-radius:3px;
  background:linear-gradient(180deg,#a86030,#784020);
  margin-left:0;flex-shrink:0;
  box-shadow:1px 2px 5px rgba(0,0,0,.3);
}
#craft-balls-wrap{
  position:absolute;
  left:4px;top:50%;transform:translateY(-50%);
  display:flex;align-items:center;
  pointer-events:none;
}
.craft-slot{
  display:inline-flex;align-items:center;justify-content:center;
  width:clamp(30px,8vw,40px);
  height:clamp(30px,8vw,40px);
}
.craft-ball{
  font-size:clamp(24px,7vw,34px);line-height:1;
  animation:ballPop .2s cubic-bezier(.34,1.56,.64,1);
  filter:drop-shadow(0 2px 3px rgba(0,0,0,.15));
  display:inline-flex;align-items:center;justify-content:center;
}
.craft-ball-empty{
  display:inline-flex;align-items:center;justify-content:center;
  width:clamp(22px,6vw,30px);height:clamp(22px,6vw,30px);
}
@keyframes ballPop{
  0%{transform:scale(0) translateY(6px);opacity:0;}
  100%{transform:scale(1) translateY(0);opacity:1;}
}
/* 우: 서빙 버튼 */
#craft-right{
  flex-shrink:0;
  width:clamp(72px,20vw,92px);
  padding:6px;
  display:flex;align-items:center;justify-content:center;
  border-left:1.5px dashed rgba(200,130,60,.25);
  position:relative;z-index:1;
}
#serve-btn{
  width:100%;height:100%;
  font-family:'Jua',sans-serif;font-size:13px;
  padding:0;border:none;border-radius:12px;
  background:rgba(200,130,60,.15);
  color:rgba(120,70,30,.4);
  cursor:not-allowed;transition:all .2s;
  letter-spacing:.03em;
  border:1.5px solid rgba(200,130,60,.2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;line-height:1.2;
}
#serve-btn .serve-emoji{font-size:22px;}
#serve-btn.on{
  background:linear-gradient(135deg,var(--sage2),var(--sage3));
  color:#fff;cursor:pointer;
  border-color:var(--sage2);
  box-shadow:0 3px 0 var(--sage3),0 4px 14px rgba(60,120,40,.35);
}
#serve-btn.on:active{transform:translateY(2px);box-shadow:0 1px 0 var(--sage3);}

/* ════════════════════════ 제작대 ════════════════════════ */
#bench{
  flex-shrink:0;
  background:linear-gradient(180deg,var(--wood2),var(--wood3));
  padding:8px 10px;
  display:flex;flex-direction:column;gap:6px;
  overflow:hidden;
  height:34vh;max-height:40vh;min-height:180px;
  padding-bottom:max(8px,env(safe-area-inset-bottom));
  position:relative;
}
#bench::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(
    90deg,transparent 0,transparent 80px,
    rgba(255,255,255,.03) 80px,rgba(255,255,255,.03) 82px
  );
}

#bench-tabs{
  display:flex;gap:4px;flex-shrink:0;position:relative;z-index:1;align-items:center;
}
#rst-btn{
  width:38px;height:34px;border-radius:10px;
  background:rgba(255,255,255,.08);
  border:1.5px solid rgba(255,255,255,.15);
  font-size:15px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,236,200,.6);
  transition:all .12s;
}
#rst-btn:active{background:rgba(255,255,255,.2);transform:scale(.92);}
.btab{
  flex:1;font-family:'Jua',sans-serif;font-size:12px;
  padding:7px 8px;border:none;border-radius:10px;
  background:rgba(255,255,255,.1);
  color:rgba(255,220,170,.55);
  cursor:pointer;transition:all .15s;
  border:1.5px solid rgba(255,255,255,.1);
}
.btab.on{
  background:rgba(255,255,255,.22);
  color:#ffecd8;font-weight:700;
  border-color:rgba(255,255,255,.3);
}
.btab.disabled{opacity:.35;cursor:not-allowed;}
#bench-panels{
  flex:1;min-height:0;position:relative;z-index:1;
  display:flex;flex-direction:column;
}
.btab-panel{display:none;flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding:2px 4px 4px 0;}
.btab-panel.on{display:block;}

.bench-section{flex-shrink:0;position:relative;z-index:1;}
.bench-lbl{
  font-family:'Jua',sans-serif;
  font-size:10px;color:rgba(255,220,170,.6);
  letter-spacing:.06em;margin-bottom:5px;
  display:flex;align-items:center;gap:4px;
}
.bench-lbl::before{content:'';display:inline-block;width:3px;height:10px;background:var(--peach2);border-radius:2px;opacity:.7;}
.pick-row{display:flex;gap:5px;flex-wrap:wrap;}

.skewer-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:7px 10px;min-width:58px;min-height:46px;justify-content:center;
  background:rgba(255,255,255,.1);
  border:1.5px solid rgba(255,255,255,.15);
  border-radius:12px;cursor:pointer;transition:all .12s;
}
.skewer-btn:active{transform:scale(.93);}
.skewer-btn.sel{
  background:linear-gradient(135deg,rgba(255,180,140,.3),rgba(255,150,100,.2));
  border-color:var(--peach2);
  box-shadow:0 0 0 2px rgba(255,180,120,.2);
}
.skewer-icon{font-size:15px;line-height:1.2;letter-spacing:-3px;}
.skewer-name{font-size:8px;color:rgba(255,220,170,.7);font-weight:700;}
.skewer-btn.sel .skewer-name{color:var(--peach);}

.dango-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:6px 5px;min-width:50px;min-height:46px;justify-content:center;
  background:rgba(255,255,255,.1);
  border:1.5px solid rgba(255,255,255,.15);
  border-radius:12px;cursor:pointer;transition:all .12s;position:relative;
}
.dango-btn:active{transform:scale(.93);}
.dango-btn.locked{opacity:.35;cursor:not-allowed;}
.dango-btn.locked::after{content:'🔒';position:absolute;top:2px;right:2px;font-size:10px;}
.dango-emoji{font-size:20px;line-height:1;}
.dango-name{font-size:8px;color:rgba(255,220,170,.7);}

.sauce-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:6px 5px;min-width:50px;min-height:46px;justify-content:center;
  background:rgba(255,255,255,.1);
  border:1.5px solid rgba(255,255,255,.15);
  border-radius:12px;cursor:pointer;transition:all .12s;position:relative;
}
.sauce-btn:active{transform:scale(.93);}
.sauce-btn.locked{opacity:.35;cursor:not-allowed;}
.sauce-btn.locked::after{content:'🔒';position:absolute;top:2px;right:2px;font-size:10px;}
.sauce-btn.sel{
  background:linear-gradient(135deg,rgba(180,220,255,.2),rgba(130,180,220,.15));
  border-color:var(--sky);
}
.sauce-emoji{font-size:20px;line-height:1;}
.sauce-name{font-size:8px;color:rgba(255,220,170,.7);}
.sauce-btn.sel .sauce-name{color:var(--sky);}

/* ════════════════════════ 토스트 ════════════════════════ */
#toast{
  position:fixed;top:58px;left:50%;transform:translateX(-50%);
  font-size:11px;font-weight:700;padding:6px 16px;border-radius:20px;
  background:var(--brown2);color:#ffecd8;
  z-index:300;opacity:0;transition:opacity .2s;pointer-events:none;
  white-space:nowrap;box-shadow:0 3px 12px rgba(80,30,10,.3);
}
#toast.show{opacity:1;}
#toast.ok{background:linear-gradient(135deg,var(--sage2),var(--sage3));}
#toast.ng{background:linear-gradient(135deg,var(--pink2),var(--pink3));}
#toast.gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff8e0;}

/* ════════════════════════ 오버레이 ════════════════════════ */
#overlay{
  display:none;position:fixed;inset:0;
  background:rgba(40,20,8,.88);z-index:100;
  align-items:center;justify-content:center;padding:16px;
}
#overlay.show{display:flex;}
.ov-card{
  background:var(--white);border-radius:24px;
  border:3px solid var(--cream3);
  width:100%;max-width:400px;
  box-shadow:0 8px 40px rgba(80,30,10,.35);overflow:hidden;
  max-height:90vh;display:flex;flex-direction:column;
}
.ov-hd{
  background:linear-gradient(135deg,var(--brown),var(--brown2));
  padding:13px 16px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;gap:10px;
}
.ov-hd-info{display:flex;flex-direction:column;flex:1;min-width:0;}
.ov-title{font-family:'Jua',sans-serif;font-size:17px;color:#ffecd8;}
.ov-sub{font-size:11px;color:rgba(255,236,200,.65);}
.ov-close{
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.28);
  color:#ffecd8;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .12s;
}
.ov-close:active{transform:scale(.9);background:rgba(255,255,255,.32);}
.ov-body{padding:14px 16px;overflow-y:auto;flex:1;min-height:0;}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:13px;}
.stat-box{
  background:linear-gradient(135deg,var(--cream),var(--cream2));
  border-radius:12px;padding:10px;border:1.5px solid var(--cream3);
}
.stat-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;}
.stat-val{font-family:'Jua',sans-serif;font-size:20px;color:var(--text);margin-top:2px;}
.stars{font-size:26px;text-align:center;margin-bottom:10px;}
.btn-row{display:flex;gap:8px;justify-content:center;padding:4px 0 0;flex-wrap:wrap;}
.abtn{font-family:'Jua',sans-serif;font-size:13px;padding:10px 18px;border:none;border-radius:50px;cursor:pointer;transition:all .12s;}
.abtn:active{transform:scale(.96);}
.abtn.sage{background:linear-gradient(135deg,var(--sage2),var(--sage3));color:#fff;box-shadow:0 3px 0 var(--sage3);}
.abtn.pink{background:linear-gradient(135deg,var(--pink2),var(--pink3));color:#fff;box-shadow:0 3px 0 var(--pink3);}
.abtn.brown{background:linear-gradient(135deg,var(--brown),var(--brown2));color:#ffecd8;box-shadow:0 3px 0 var(--brown3);}
.abtn.gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;box-shadow:0 3px 0 var(--gold2);}

/* 상점 탭 */
.shop-tabs{display:flex;gap:4px;margin-bottom:10px;border-bottom:2px solid var(--cream3);padding-bottom:6px;}
.shop-tab{
  flex:1;font-family:'Jua',sans-serif;font-size:11px;padding:6px 4px;
  border:none;border-radius:8px;background:var(--cream);color:var(--text3);cursor:pointer;
}
.shop-tab.on{background:linear-gradient(135deg,var(--brown),var(--brown2));color:#ffecd8;}

.shop-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;}
.shop-item{background:var(--cream);border:2px solid var(--cream3);border-radius:12px;padding:10px;display:flex;flex-direction:column;}
.shop-item.owned{border-color:var(--sage2);background:linear-gradient(135deg,#f0fce8,#e8f8d8);}
.si-icon{font-size:22px;margin-bottom:3px;}
.si-name{font-size:11px;font-weight:700;color:var(--text);margin-bottom:2px;}
.si-desc{font-size:9px;color:var(--text3);line-height:1.5;margin-bottom:6px;flex:1;}
.si-btn{font-family:'Jua',sans-serif;font-size:10px;padding:5px 8px;border:none;border-radius:8px;cursor:pointer;width:100%;}
.si-btn.buy{background:linear-gradient(135deg,var(--sage2),var(--sage3));color:#fff;}
.si-btn.cant{background:var(--cream2);color:var(--text3);cursor:not-allowed;}
.si-btn.have{background:#d1fae5;color:var(--sage3);cursor:default;}
.si-btn.equip{background:linear-gradient(135deg,var(--peach2),var(--peach3));color:#fff;}
.si-btn.equipped{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;cursor:default;}
.si-btn[disabled]{opacity:.8;cursor:default;}
.si-lv{display:inline-block;margin-left:3px;font-size:9px;font-weight:700;color:var(--sage3);background:#e8f5eb;padding:1px 5px;border-radius:6px;}
.si-cur{font-size:9px;color:var(--sage3);font-weight:700;margin-bottom:6px;line-height:1.4;}
.si-next{color:var(--peach3);font-weight:700;}

/* 퀘스트 */
.quest-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.quest-item{
  background:var(--cream);border:1.5px solid var(--cream3);border-radius:12px;
  padding:10px;display:flex;align-items:center;gap:10px;
}
.quest-item.done{background:linear-gradient(135deg,#f0fce8,#e8f8d8);border-color:var(--sage2);}
.quest-item.claimed{opacity:.55;}
.q-icon{font-size:22px;flex-shrink:0;}
.q-info{flex:1;min-width:0;}
.q-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:3px;}
.q-desc{font-size:10px;color:var(--text3);line-height:1.4;margin-bottom:4px;}
.q-bar-bg{height:6px;background:var(--cream2);border-radius:3px;overflow:hidden;margin-bottom:2px;}
.q-bar{height:6px;background:linear-gradient(90deg,var(--sage),var(--sage2));border-radius:3px;transition:width .3s;}
.q-prog{font-size:9px;color:var(--text3);}
.q-reward{font-size:10px;font-weight:700;color:var(--gold2);background:#fff8e0;padding:4px 8px;border-radius:16px;white-space:nowrap;flex-shrink:0;}
.q-claim-btn{font-family:'Jua',sans-serif;font-size:10px;padding:5px 10px;border:none;border-radius:16px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;cursor:pointer;flex-shrink:0;}
.q-claim-btn:active{transform:scale(.94);}
.q-section-title{font-family:'Jua',sans-serif;font-size:13px;color:var(--brown2);margin:10px 0 6px;display:flex;align-items:center;gap:6px;}
.q-section-title::before{content:'';width:4px;height:14px;background:var(--peach2);border-radius:2px;}

/* 설정 */
.setting-section{margin-bottom:14px;}
.setting-title{font-family:'Jua',sans-serif;font-size:13px;color:var(--brown2);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.cust-setting-grid{display:flex;flex-direction:column;gap:8px;}
.cust-entry{background:var(--cream);border:1.5px solid var(--cream3);border-radius:12px;padding:10px;}
.cust-entry.active{border-color:var(--sage2);background:linear-gradient(135deg,#f8fff0,#f0fce0);}
.cust-entry-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.cust-entry-imgs{display:flex;gap:5px;}
.img-upload-box{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;}
.img-thumb{
  width:42px;height:52px;border-radius:8px;
  object-fit:contain;object-position:center bottom;
  border:2px solid var(--cream3);background:var(--cream2);
  transition:border-color .15s;
}
.img-upload-box:hover .img-thumb{border-color:var(--pink2);}
.img-lbl{font-size:8px;font-weight:700;}
.img-lbl.normal{color:var(--text3);}
.img-lbl.happy{color:var(--sage2);}
.img-lbl.angry{color:var(--pink2);}
.cust-entry-info{flex:1;min-width:0;}
.cust-name-input{
  font-family:'Noto Sans KR',sans-serif;font-size:13px;
  width:100%;background:var(--white);border:1.5px solid var(--cream3);
  border-radius:8px;padding:5px 10px;color:var(--text);outline:none;margin-bottom:5px;
}
.cust-name-input:focus{border-color:var(--pink2);}
.cust-btns{display:flex;gap:5px;flex-wrap:wrap;}
.cust-use-btn{font-size:10px;padding:4px 10px;border-radius:20px;border:1.5px solid;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.cust-use-btn.active{background:var(--sage2);border-color:var(--sage3);color:#fff;}
.cust-use-btn.inactive{background:transparent;border-color:var(--cream3);color:var(--text3);}
.cust-del-btn{font-size:10px;padding:4px 10px;border-radius:20px;border:1.5px solid var(--pink2);background:transparent;color:var(--pink3);cursor:pointer;}
.add-cust-btn{width:100%;padding:10px;border-radius:12px;border:2px dashed var(--cream3);background:transparent;font-family:'Jua',sans-serif;font-size:13px;color:var(--text3);cursor:pointer;transition:all .15s;margin-top:6px;}
.add-cust-btn:hover{border-color:var(--pink2);color:var(--pink3);}
input.hidden-file{display:none;}

/* 이미지 슬롯 */
.slot-section{margin-top:8px;border-top:1px dashed var(--cream3);padding-top:8px;}
.slot-label{font-size:10px;font-weight:700;color:var(--text3);margin-bottom:5px;display:flex;align-items:center;justify-content:space-between;}
.slot-row{display:flex;gap:5px;flex-wrap:wrap;}
.slot-item{
  position:relative;width:44px;height:54px;border:2px solid var(--cream3);border-radius:8px;
  background:var(--cream2);cursor:pointer;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.slot-item.current{border-color:var(--sage2);box-shadow:0 0 0 2px rgba(100,170,70,.25);}
.slot-item img{width:100%;height:100%;object-fit:contain;object-position:center bottom;}
.slot-item .slot-del{
  position:absolute;top:-3px;right:-3px;
  background:var(--pink3);color:#fff;font-size:10px;width:16px;height:16px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  cursor:pointer;border:1.5px solid #fff;
}
.slot-item.empty{
  font-size:18px;color:var(--text3);border-style:dashed;
}

/* 장식/테마 선택 */
.deco-toggle{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 10px;background:var(--cream);border-radius:10px;margin-bottom:6px;border:1.5px solid var(--cream3);}
.deco-toggle .dt-info{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
.deco-toggle .dt-icon{font-size:20px;}
.deco-toggle .dt-name{font-size:12px;font-weight:700;color:var(--text);}
.deco-toggle .dt-switch{
  width:44px;height:24px;border-radius:12px;background:var(--cream3);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;
}
.deco-toggle .dt-switch::after{
  content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;
  background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:left .2s;
}
.deco-toggle.on .dt-switch{background:var(--sage2);}
.deco-toggle.on .dt-switch::after{left:22px;}

</style>
</head>
<body>

<div id="start"></div>
<div id="game" style="display:none;"></div>

<!-- 헤더 -->
<div id="hdr">
  <div class="hdr-r1">
    <div class="hdr-title">🍡 당고집</div>
    <div class="hdr-btns">
      <div class="hdr-btn" onclick="openQuests()" id="quest-btn">📜<span class="badge" id="quest-badge" style="display:none">0</span></div>
      <div class="hdr-btn" onclick="openShop()">🛒</div>
      <div class="hdr-btn" onclick="openSettings()">⚙️</div>
    </div>
  </div>
  <div class="hdr-r2">
    <div class="hdr-stats">
      <div class="hchip">📅 <b id="h-day">Day1</b></div>
      <div class="hchip">💰 <b id="h-money">0</b>원</div>
      <div class="hchip">😊 <b id="h-happy">0</b></div>
    </div>
    <div id="hdr-timer">1:00</div>
  </div>
</div>

<!-- 가게 뷰 -->
<div id="store">
  <div id="store-bg"></div>
  <div id="counter-top"></div>
  <div id="sign">🍡 당고집 · 매일 신선한 당고!</div>
  <span class="deco" style="left:6px;bottom:54%;">🪴</span>
  <span class="deco" style="right:6px;bottom:54%;">🌸</span>
  <div id="shop-decos"></div>
  <div id="aff-badge" class="hidden"></div>
  <div id="customer-area">
    <div id="speech-bubble" class="hidden"></div>
    <div id="cust-wrap">
      <img id="cust-img" src="" alt="손님">
      <div id="cust-tbar-bg"><div id="cust-tbar"></div></div>
    </div>
  </div>
</div>

<!-- 제작 디스플레이 (좌: 완성꼬치 / 중: 현재 제작 / 우: 서빙버튼) -->
<div id="craft-display">
  <div id="done-skewers">
    <div class="done-lbl">완성 꼬치</div>
    <div id="done-list"></div>
  </div>
  <div id="craft-center">
    <div id="craft-status">당고를 골라서 꼬치에 꿰어요!</div>
    <div id="craft-stick-wrap">
      <div id="craft-stick-bg"></div>
      <div id="craft-handle"></div>
      <div id="craft-balls-wrap"></div>
    </div>
  </div>
  <div id="craft-right">
    <button id="serve-btn" onclick="doServe()">
      <span class="serve-emoji">🍱</span>
      <span>서빙!</span>
    </button>
  </div>
</div>

<!-- 제작대 -->
<div id="bench">
  <div id="bench-tabs">
    <button class="btab on" id="btab-dango" onclick="switchTab('dango')">🍡 당고</button>
    <button class="btab" id="btab-sauce" onclick="switchTab('sauce')">🍯 소스</button>
    <button id="rst-btn" onclick="resetCraft()" title="초기화">🗑</button>
  </div>
  <div id="bench-panels">
    <div class="btab-panel on" id="panel-dango">
      <div class="pick-row" id="dango-row"></div>
    </div>
    <div class="btab-panel" id="panel-sauce">
      <div class="pick-row" id="sauce-row"></div>
    </div>
  </div>
</div>

<div id="overlay"><div class="ov-card" id="ov-card"></div></div>
<div id="toast"></div>

<script>
/* ══════════════════════════════════════
   데이터 정의
════════════════════════════════════════ */

// 당고 (일부는 해금 필요) — 재료 대폭 확장
const DANGOS=[

const SAUCES_DEF=[
  {id:'mitarashi',label:'미타라시',emoji:'🍯',unlocked:true},
  {id:'kinako',   label:'키나코',   emoji:'🟡',unlocked:true},

/* ══════════════════════════════════════
   손님 + 이미지 슬롯
   각 손님마다 imgSlots = { normal:[...], happy:[...], angry:[...] }
   imgIdx = { normal:0, happy:0, angry:0 } (현재 선택된 슬롯)
════════════════════════════════════════ */
let CUSTS=[];
let activeCustIdx=0;

function makeDefaultCust(i, idOverride){
  const h=HAIR_COLORS[i%HAIR_COLORS.length],s=SKIN_COLORS[i%SKIN_COLORS.length];
  return {
    id: idOverride || 'c'+Date.now()+'_'+i,
    name: i===0?'하나짱':i===1?'타로군':'새 손님',
    imgs: {normal:null,happy:null,angry:null},
    defImgs: {
      normal:makeSVG(h,s,'normal'),
      happy: makeSVG(h,s,'happy'),
      angry: makeSVG(h,s,'angry'),
    },
    active: true,
  };
}

function getActiveCusts(){return CUSTS.filter(c=>c.active);}
function getCustImg(state){
  const list=getActiveCusts();
  if(!list.length)return makeSVG('#5a3010','fcd9b0',state);
  const c=list[activeCustIdx%list.length];
  return c.imgs[state]||c.defImgs[state];
}
function setCustImg(state){
  const img=document.getElementById('cust-img');
  const tbar=document.getElementById('cust-tbar-bg');
  if(state==='empty'){
    img.className='empty';
    tbar.classList.add('empty');
    hideAffinityBadge();
    return;
  }
  // 실제 이미지는 3종(normal/happy/angry) — 다른 표정은 CSS 필터/애니메이션으로 표현
  const imgState = ['normal','happy','angry'].includes(state)
    ? state
    : (['excited','smile','love'].includes(state) ? 'happy'
       : (['sad','tired','shy'].includes(state) ? 'normal'
       : (state==='surprise' ? 'normal' : 'normal')));
  img.src=getCustImg(imgState);
  img.className=state==='normal'?'':state;
  tbar.classList.remove('empty');
}
function renderAffinityBadge(custId, isVip){
  const el=document.getElementById('aff-badge');
  if(!el)return;
  if(!custId){el.classList.add('hidden');return;}
  const v=getAffinity(custId);
  const lv=affLevel(v);
  const name=custName(custId);
  const hearts='💝'.repeat(Math.min(5,lv+(v>=5?1:0)))+(lv<4?'🤍'.repeat(Math.max(0,4-(lv+(v>=5?1:0)))):'');
  const nextThreshold=[5,20,50,100,100][lv]||100;
  const prevThreshold=[0,5,20,50,100][lv]||0;
  const pct=lv>=4?100:Math.min(100,(v-prevThreshold)/(nextThreshold-prevThreshold)*100);
  el.innerHTML=`
    <div class="aff-hearts">${hearts}</div>
    <div>
      <div>${isVip?'👑 ':''}${name} <span class="aff-lv">${affLabel(lv)}</span></div>
      <div class="aff-bar"><div style="width:${pct}%"></div></div>
    </div>`;
  el.classList.remove('hidden');
  el.classList.toggle('vip', !!isVip);
}
function hideAffinityBadge(){
  const el=document.getElementById('aff-badge');
  if(el)el.classList.add('hidden');
}

};
// 호감도 관리
function getAffinity(id){return (G.affinity&&G.affinity[id])||0;}
function changeAffinity(id, delta){
  if(!id)return 0;
  if(!G.affinity)G.affinity={};
  // noanger 버프: 감소량 완화
  if(delta<0 && buffLv('noanger')>0){
    delta = Math.ceil(delta * (1 - 0.2*buffLv('noanger')));
  }
  const prev=G.affinity[id]||0;
  const next=Math.max(0, Math.min(999, prev+delta));
  G.affinity[id]=next;
  // 레벨업 토스트
  const lv=affLevel(next), pl=affLevel(prev);
  if(lv>pl && delta>0)toast(`💖 ${custName(id)} 호감도 LV.${lv}!`,'gold');
  return next;
}
function affLevel(v){
  if(v>=100)return 4; // 단골 VIP
  if(v>=50)return 3;  // 친한 사이
  if(v>=20)return 2;  // 아는 사이
  if(v>=5)return 1;   // 낯익은
  return 0;
}
function affLabel(lv){return ['처음','낯익음','아는 사이','친한 사이','단골 VIP'][lv]||'처음';}
function custName(id){const c=CUSTS.find(x=>x.id===id);return c?c.name:'손님';}
const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;

}

// 필요한 재료가 모두 해금되었는지
function menuAvailable(m){
  if(!m.needs)return true;
  for(const id of m.needs){
    // 당고/소스 둘 다 체크
    const isDango=DANGOS.find(d=>d.id===id);
    const isSauce=SAUCES[id];
    if(isDango && !isDango.unlocked && !G.unlockedDangos[id]) return false;
    if(isSauce && !isSauce.unlocked && !G.unlockedSauces[id]) return false;
  }
  return true;
}

// 주문 풀을 Day와 난이도에 따라 구성
// diff 1~2: 단순, 3~4: 중간, 5: 복잡
function pickWeightedMenu(){
  const avail=BASE_MENUS.filter(menuAvailable);
  // Day별 난이도 분포 가중치
  const d=G.day;
  let weights;
  if(d<=2){
    weights={1:60, 2:30, 3:10, 4:0, 5:0};
  }else if(d<=4){
    weights={1:30, 2:35, 3:25, 4:10, 5:0};
  }else if(d<=6){
    weights={1:15, 2:25, 3:30, 4:20, 5:10};
  }else if(d<=9){
    weights={1:8,  2:17, 3:25, 4:30, 5:20};
  }else{
    weights={1:5,  2:10, 3:20, 4:30, 5:35};
  }
  // 난이도 목표 결정
  let target;
  const roll=Math.random()*100;let acc=0;
  for(const diff of [1,2,3,4,5]){
    acc+=weights[diff]||0;
    if(roll<=acc){target=diff;break;}
  }
  if(!target)target=1;

  // 목표 난이도에 맞는 메뉴 후보
  let candidates=avail.filter(m=>m.diff===target);
  // 없으면 인접 난이도로 폴백
  if(!candidates.length){
    for(let delta=1;delta<=4 && !candidates.length;delta++){
      candidates=avail.filter(m=>m.diff===target-delta||m.diff===target+delta);
    }
  }
  if(!candidates.length)candidates=avail;
  // 이전 메뉴는 피함
  let menu;
  let attempts=0;
  do{
    menu=candidates[rnd(0,candidates.length-1)];
    attempts++;
  }while(candidates.length>1 && menu===G.lastMenu && attempts<8);
  G.lastMenu=menu;
  return menu;
}

// 손님 인내심 — 기본 빠르게, Day 올라갈수록 더 빠르게
function getTL(){
  // 기본 18초 시작 → Day마다 1초씩 감소 → 최소 6초
  const base=Math.max(6000, 18000 - (G.day-1)*1000);
  // timer 업그레이드(레벨당 +2초)
  const bonus=buffValue('timer',2)*1000;
  return base + bonus;
}

function spawnCust(){
  if(G.sec<=0)return;
  const list=getActiveCusts();
  if(list.length>1)activeCustIdx=(activeCustIdx+1)%list.length;
  const menu=pickWeightedMenu();
  const baseTL=getTL();
  // 난이도 높으면 시간 살짝 더
  const tl=baseTL + (menu.diff>=3?(menu.diff-2)*2000:0);
  const curCust=list[activeCustIdx%list.length];
  const custId=curCust?curCust.id:null;
  // VIP 확률: buff 레벨당 10%
  const vipChance=buffValue('vip',0.10);
  const isVip = vipChance>0 && Math.random()<vipChance;
  G.cust={menu,tl,maxTl:tl,custId,isVip};
  // 호감도 높은 손님은 설렘/기쁨 표정으로 등장
  const aff=getAffinity(custId);
  let startExp='normal';
  if(aff>=50) startExp='excited';
  else if(aff>=20) startExp='smile';
  setCustImg(startExp);showBubble('order',menu);setTbar(100,'var(--sage2)');
  renderAffinityBadge(custId, isVip);
  if(G.ctimer)clearInterval(G.ctimer);
  G.ctimer=setInterval(()=>{
    if(!G.cust)return;
    G.cust.tl-=200;
    const pct=Math.max(0,G.cust.tl/G.cust.maxTl*100);
    const bc=pct>55?'var(--sage2)':pct>25?'var(--peach2)':'var(--pink2)';
    setTbar(pct,bc);
    if(G.cust.tl<=0){clearInterval(G.ctimer);loseC();}
  },200);
}
function loseC(){
  const lostCustId=G.cust?G.cust.custId:null;
  G.cust=null;G.angry++;G.dayAngry++;G.combo=0;
  setCustImg('angry');showBubble('angry');updateHUD();
  toast('😤 손님이 화내며 가셨어요!','ng');
  if(lostCustId)changeAffinity(lostCustId, -3);
  const wait=Math.max(500,1800-buffValue('fast',150));
  setTimeout(()=>{showBubble('hidden');setCustImg('empty');setTbar(100,'var(--sage2)');if(G.sec>0)setTimeout(spawnCust,wait);},1800);
}

function showBubble(type,menu){
  const el=document.getElementById('speech-bubble');
  el.className='bubble';
  if(type==='hidden'){el.classList.add('hidden');el.innerHTML='';return;}
  if(type==='happy'){el.classList.add('happy');el.innerHTML='<div class="bub-msg">😋 최고예요!</div>';return;}
  if(type==='angry'){el.classList.add('angry');el.innerHTML='<div class="bub-msg">😡 별로예요!</div>';return;}
  if(type==='order'&&menu){
    el.classList.add('wait');
    function skSVG(dangos){
      const balls=[];
      Object.entries(dangos).forEach(([id,cnt])=>{const d=DANGOS.find(x=>x.id===id);if(d)for(let i=0;i<cnt;i++)balls.push(d.emoji);});
      const n=balls.length||3,W=n*24+20,H=30;
      return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="${H/2-3}" width="${W-4}" height="6" rx="3" fill="#d4a030"/>
        ${balls.map((e,i)=>`<text x="${10+(i+.5)*24}" y="${H/2+8}" font-size="20" text-anchor="middle">${e}</text>`).join('')}
        <rect x="${W-7}" y="${H/2-8}" width="5" height="16" rx="2" fill="#784020"/>
      </svg>`;
    }
    const si=SAUCES[menu.sauce];
    const diffStars=('★'.repeat(menu.diff||1));
    el.innerHTML=`
      <div class="bub-title">주문할게요! <span class="diff">${diffStars}</span></div>
      <div class="bub-skewers">${menu.skewers.map(dangos=>`<div class="bub-skewer-row">${skSVG(dangos)}</div>`).join('')}</div>
      <div class="bub-sauce-row">${si.emoji} 소스: <b>${si.label}</b></div>`;
  }
}

function isDangoUnlocked(d){return d.unlocked || G.unlockedDangos[d.id];}
function isSauceUnlocked(s){return s.unlocked || G.unlockedSauces[s.id];}

function buildDangoRow(){
  const row=document.getElementById('dango-row');row.innerHTML='';
  DANGOS.forEach(d=>{
    const btn=document.createElement('div');

function addDango(id){
  if(G.curBalls.length>=3){toast('당고 3개가 꽉 찼어요!','ng');return;}
  const d=DANGOS.find(x=>x.id===id);if(!d)return;
  G.curBalls.push({id,emoji:d.emoji,name:d.name});
  if(G.curBalls.length===3){
    G.doneSkewers.push([...G.curBalls]);
    G.curBalls=[];
    toast(`🍡 ${G.doneSkewers.length}번째 꼬치 완성!`,'ok');
  }
  updateCraftDisplay();checkReady();
}
function updateCraftDisplay(){
  const statusEl=document.getElementById('craft-status');
  const ballsWrap=document.getElementById('craft-balls-wrap');
  const doneEl=document.getElementById('done-list');
  const done=G.doneSkewers.length;

  if(done===0&&G.curBalls.length===0){
    statusEl.innerHTML='당고를 꿰어요!';
  } else if(G.sauce&&done>0&&G.curBalls.length===0){
    statusEl.innerHTML=`✅ ${done}개 완성! <em>서빙!</em>`;
  } else {
    statusEl.innerHTML=`🍡 ${done+1}번째 — <em>${G.curBalls.length}/3</em>`;
  }

  // 슬롯 크기(각 칸) — 꿰어진 당고와 점선 원이 동일한 중심을 가지도록
  const slotSz=Math.min(40,Math.max(30,window.innerWidth*0.08));
  const emptySz=Math.min(30,Math.max(22,window.innerWidth*0.06));
  const stickW=3*slotSz+16;
  document.getElementById('craft-stick-bg').style.width=stickW+'px';

  let ballsHTML='';
  for(let i=0;i<3;i++){
    if(i<G.curBalls.length){
      ballsHTML+=`<span class="craft-slot"><span class="craft-ball">${G.curBalls[i].emoji}</span></span>`;
    } else {
      ballsHTML+=`<span class="craft-slot"><span class="craft-ball-empty"><svg width="${emptySz}" height="${emptySz}" viewBox="0 0 34 34"><circle cx="17" cy="17" r="14" fill="none" stroke="rgba(200,140,80,.35)" stroke-width="2.5" stroke-dasharray="5 4"/></svg></span></span>`;
    }
  }
  ballsWrap.innerHTML=ballsHTML;

  if(done===0){
    doneEl.innerHTML=`<div class="done-empty">꼬치가<br>아직 없어요</div>`;
  } else {
    doneEl.innerHTML=G.doneSkewers.map(sk=>`<div class="done-sk">${sk.map(b=>b.emoji).join('')}🍢</div>`).join('');
  }
}
function setSauce(s){
  G.sauce=s;
  document.querySelectorAll('[data-s]').forEach(b=>b.classList.toggle('sel',b.dataset.s===s));
  checkReady();
}
function checkReady(){
  const ok=G.doneSkewers.length>=1&&!!G.sauce&&G.curBalls.length===0;
  const btn=document.getElementById('serve-btn');
  btn.className=ok?'on':'';
  btn.style.boxShadow=(ok&&buffLv('hint')&&G.cust&&orderMatch())?'0 3px 0 var(--sage3),0 0 0 3px rgba(100,180,80,.3)':'';
}
function orderMatch(){
  if(!G.cust)return false;
  const m=G.cust.menu;
  if(G.doneSkewers.length!==m.skewers.length)return false;
  const usedIdx=new Set();
  for(const req of m.skewers){
    let found=false;
    for(let i=0;i<G.doneSkewers.length;i++){
      if(usedIdx.has(i))continue;
      const my={};G.doneSkewers[i].forEach(b=>{my[b.id]=(my[b.id]||0)+1;});
      const keys=Object.keys(req);
      if(keys.length===Object.keys(my).length&&keys.every(k=>(my[k]||0)===req[k])){
        usedIdx.add(i);found=true;break;
      }
    }
    if(!found)return false;
  }
  return G.sauce===m.sauce;
}
function doServe(){
  if(!(G.doneSkewers.length>=1&&G.sauce&&G.curBalls.length===0))return;
  if(!G.cust){toast('손님이 없어요!','ng');return;}
  const matched=orderMatch(),savedMenu=G.cust.menu;
  const servedCustId=G.cust.custId;
  const wasVip=G.cust.isVip;
  clearInterval(G.ctimer);G.cust=null;G.total++;G.dayServed++;
  updateProgress('served', G.dayServed, true);
  if(matched){
    G.correct++;G.dayCorrect++;G.combo++;
    if(G.combo>G.bestCombo)G.bestCombo=G.combo;
    let price=savedMenu.base;
    if(savedMenu.diff>=4)price+=Math.floor(price*0.1); // 어려운 메뉴 추가 보너스
    if(buffLv('tip')>0)price+=buffValue('tip',200);
    if(buffLv('combo')>0&&G.combo%3===0){const b=buffValue('combo',600);price+=b;toast(`🔥 ${G.combo}콤보! +${b.toLocaleString()}원!`,'gold');}
    if(buffLv('combo2')>0&&G.combo%5===0){const b=buffValue('combo2',1500);price+=b;toast(`🌟 ${G.combo}콤보! +${b.toLocaleString()}원!`,'gold');}
    if(buffLv('price')>0)price=Math.floor(price*(1+buffValue('price',0.04)));
    if(buffLv('bigsale')>0 && savedMenu.diff>=4){const b=Math.floor(savedMenu.base*buffValue('bigsale',0.05));price+=b;toast(`🎯 대형주문! +${b.toLocaleString()}원`,'gold');}
    if(wasVip){const b=Math.floor(price*0.5);price+=b;toast(`👑 VIP! +${b.toLocaleString()}원`,'gold');}
    // 호감도 보너스: 친한 손님일수록 팁 ↑
    if(servedCustId){
      const aff=getAffinity(servedCustId);
      let affMult=0;
      if(aff>=20)affMult+=0.05;
      if(aff>=50)affMult+=0.05;
      if(aff>=100)affMult+=0.10;
      if(affMult>0){
        const affBonus=Math.floor(price*affMult);
        price+=affBonus;
        if(aff>=100)toast(`💖 단골 VIP! +${affBonus.toLocaleString()}원`,'gold');
      }
      // 호감도 상승
      const gain=1 + buffValue('loyal',1);
      changeAffinity(servedCustId, gain);
    }
    G.money+=price;G.dayMoney+=price;G.happy++;G.dayHappy++;
    // 꼬치 3개짜리 대형 주문
    if(savedMenu.skewers.length>=3)G.dayBigOrder++;
    setCustImg('happy');showBubble('happy');setTbar(100,'var(--sage2)');
    updateHUD();toast(`😋 완벽! +${price.toLocaleString()}원 ✨`,'ok');
    // 퀘스트 진행도 갱신
    updateProgress('correct', G.dayCorrect, true);
    updateProgress('dayMoney', G.dayMoney, true);
    updateProgress('bestCombo', G.combo, true);
    updateProgress('bestCombo_all', G.bestCombo);
    updateProgress('dayHappy', G.dayHappy, true);
    updateProgress('money', G.money);
    updateProgress('happy', G.happy);
    if(savedMenu.skewers.length>=3)updateProgress('bigOrder', G.dayBigOrder, true);
  }else{
    G.combo=0;
    // 평화의 기운 버프: 화내는 확률 감소(절반 수준으로)
    const reduce = buffLv('noanger')>0 && Math.random() < 0.3 + 0.1*buffLv('noanger');
    if(!reduce){
      G.dayAngry++;G.angry++;setCustImg('angry');showBubble('angry');
      toast('⚠️ 주문이랑 달라요!','ng');
    }else{
      setCustImg('sad');showBubble('sad');
      toast('😔 손님이 아쉬워해요…','ng');
    }
    updateHUD();
    if(servedCustId){
      // 실패 시 호감도 감소
      changeAffinity(servedCustId, -2);
    }
  }
  const wait=Math.max(500,1500-buffValue('fast',150));
  setTimeout(()=>{showBubble('hidden');setCustImg('empty');setTbar(100,'var(--sage2)');if(G.sec>0)setTimeout(spawnCust,wait);},1800);
  resetCraft();
  saveGame();
}
function switchTab(tab){
  document.querySelectorAll('.btab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.btab-panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('btab-'+tab).classList.add('on');
  document.getElementById('panel-'+tab).classList.add('on');
}

function resetCraft(){
  G.curBalls=[];G.doneSkewers=[];G.sauce=null;
  document.querySelectorAll('[data-s]').forEach(b=>b.classList.remove('sel'));
  switchTab('dango');
  updateCraftDisplay();checkReady();
}

function endDay(){
  clearInterval(G.ctimer);
  if(G.cust){G.cust=null;}
  if(G.ctimer){clearInterval(G.ctimer);}
  setCustImg('empty');
  showBubble('hidden');
  // 평화로운 날 퀘스트
  if(G.dayAngry===0 && G.dayServed>0){
    updateProgress('noAngry',1,true);
  }
  saveGame();
  G.isEndDay=true;
  showEndDay();

let _shopTab='buffs';
function openShop(){
  _shopTab='buffs';
  renderShop();
}
function renderShop(){
  const tabs=[
    {id:'buffs',  icon:'⚡',name:'업그레이드'},
    {id:'ingred', icon:'🍡',name:'재료 해금'},
    {id:'deco',   icon:'🏮',name:'꾸미기'},
    {id:'theme',  icon:'🎨',name:'테마'},
  ];
  let bodyHTML='';
  if(_shopTab==='buffs'){
    bodyHTML=`<div class="shop-grid">${SHOP_BUFFS.map(it=>{
      const lv=buffLv(it.id);
      const max=it.maxLv||1;
      const isMax=lv>=max;
      const nextPrice=isMax?0:buffPrice(it,lv);
      const can=!isMax && G.money>=nextPrice;
      const curLabel = it.valueLabel ? it.valueLabel(lv) : (lv>0?'✓ 활성':'비활성');
      const nextLabel = !isMax && it.valueLabel ? '→ '+it.valueLabel(lv+1) : '';
      return `<div class="shop-item${lv>0?' owned':''}">
        <div class="si-icon">${it.icon}</div>
        <div class="si-name">${it.name} ${max>1?`<span class="si-lv">Lv ${lv}/${max}</span>`:(lv>0?'<span class="si-lv">✓</span>':'')}</div>
        <div class="si-desc">${it.desc}</div>
        <div class="si-cur">${curLabel}${nextLabel?`<span class="si-next"> ${nextLabel}</span>`:''}</div>
        <button class="si-btn ${isMax?'have':can?'buy':'cant'}" onclick="buyBuff('${it.id}')" ${isMax?'disabled':''}>
          ${isMax?'✓ 최대':can?'💰 '+nextPrice.toLocaleString()+'원':'💸 '+nextPrice.toLocaleString()+'원'}
        </button></div>`;
    }).join('')}</div>`;
  } else if(_shopTab==='ingred'){
    const lockedDangos=DANGOS.filter(d=>!d.unlocked);
    const lockedSauces=SAUCES_DEF.filter(s=>!s.unlocked);
    const all=[...lockedDangos.map(d=>({...d, _type:'dango',  label:d.name})),
               ...lockedSauces.map(s=>({...s, _type:'sauce',  label:s.label}))];
    bodyHTML=`<div class="shop-grid">${all.map(it=>{
      const owned=it._type==='dango'?G.unlockedDangos[it.id]:G.unlockedSauces[it.id];
      const can=!owned&&G.money>=it.price;
      return `<div class="shop-item${owned?' owned':''}">
        <div class="si-icon">${it.emoji}</div><div class="si-name">${it.label}</div>
        <div class="si-desc">${it._type==='dango'?'새 당고 재료 해금':'새 소스 해금'}${it.tier?' · '+it.tier:''}</div>
        <button class="si-btn ${owned?'have':can?'buy':'cant'}" onclick="buyIngred('${it._type}','${it.id}')">
          ${owned?'✓ 해금됨':can?'💰 '+it.price.toLocaleString()+'원':'💸 '+it.price.toLocaleString()+'원'}
        </button></div>`;
    }).join('')}</div>`;
  } else if(_shopTab==='deco'){
    bodyHTML=`<div class="shop-grid">${SHOP_DECOS.map(it=>{
      const owned=G.decos[it.id];
      const on=G.decosOn[it.id];
      const can=!owned&&G.money>=it.price;
      return `<div class="shop-item${owned?' owned':''}">
        <div class="si-icon">${it.icon}</div><div class="si-name">${it.name}</div>
        <div class="si-desc">${it.desc}</div>
        ${owned
          ? `<button class="si-btn ${on?'equipped':'equip'}" onclick="toggleDeco('${it.id}')">${on?'✓ 표시중':'표시'}</button>`
          : `<button class="si-btn ${can?'buy':'cant'}" onclick="buyDeco('${it.id}')">${can?'💰 '+it.price.toLocaleString()+'원':'💸 '+it.price.toLocaleString()+'원'}</button>`
        }
      </div>`;
    }).join('')}</div>`;
  } else if(_shopTab==='theme'){
    bodyHTML=`<div class="shop-grid">${SHOP_THEMES.map(it=>{
      const owned=G.themes[it.id];
      const current=G.curTheme===it.id;
      const can=!owned&&G.money>=it.price;
      return `<div class="shop-item${owned?' owned':''}">
        <div class="si-icon">${it.icon}</div><div class="si-name">${it.name}</div>
        <div class="si-desc">${it.desc}</div>
        ${owned
          ? `<button class="si-btn ${current?'equipped':'equip'}" onclick="setTheme('${it.id}')">${current?'✓ 적용됨':'적용'}</button>`
          : `<button class="si-btn ${can?'buy':'cant'}" onclick="buyTheme('${it.id}')">${can?'💰 '+it.price.toLocaleString()+'원':'💸 '+it.price.toLocaleString()+'원'}</button>`
        }
      </div>`;
    }).join('')}</div>`;
  }
  showOv(`<div class="ov-hd">
      <div class="ov-hd-info"><div class="ov-title">🛒 상점</div><div class="ov-sub">💰 ${G.money.toLocaleString()}원</div></div>
      <button class="ov-close" onclick="closeOv()" title="닫기">✕</button>
    </div>
    <div class="ov-body">
      <div class="shop-tabs">
        ${tabs.map(t=>`<button class="shop-tab${_shopTab===t.id?' on':''}" onclick="switchShop('${t.id}')">${t.icon} ${t.name}</button>`).join('')}
      </div>

}
function switchShop(t){_shopTab=t;renderShop();}
function buyBuff(id){
  const it=SHOP_BUFFS.find(x=>x.id===id);
  if(!it)return;
  const lv=buffLv(id);
  const max=it.maxLv||1;
  if(lv>=max)return;
  const price=buffPrice(it,lv);
  if(G.money<price)return;
  G.money-=price;
  G.buffs[id]=lv+1;
  updateHUD();renderShop();
  if(lv+1>=max)toast(`${it.icon} "${it.name}" 최대 레벨!`,'gold');
  else toast(`${it.icon} "${it.name}" Lv.${lv+1} 업!`,'ok');
  saveGame();
}
function buyIngred(type,id){
  if(type==='dango'){
    const it=DANGOS.find(x=>x.id===id);
    if(!it||G.unlockedDangos[id]||G.money<it.price)return;
    G.money-=it.price;G.unlockedDangos[id]=true;
    buildDangoRow();
    toast(`${it.emoji} "${it.name}" 해금!`,'ok');
  } else {
    const it=SAUCES[id];
    if(!it||G.unlockedSauces[id]||G.money<it.price)return;
    G.money-=it.price;G.unlockedSauces[id]=true;
    buildSauceRow();
    toast(`${it.emoji} "${it.label}" 소스 해금!`,'ok');
  }
  updateHUD();renderShop();saveGame();
}
function buyDeco(id){
  const it=SHOP_DECOS.find(x=>x.id===id);
  if(!it||G.decos[id]||G.money<it.price)return;
  G.money-=it.price;G.decos[id]=true;G.decosOn[id]=true;
  updateHUD();applyDecos();renderShop();toast(`${it.icon} "${it.name}" 구매!`,'ok');
  saveGame();
}
function toggleDeco(id){
  if(!G.decos[id])return;
  G.decosOn[id]=!G.decosOn[id];
  applyDecos();renderShop();
  saveGame();
}
function buyTheme(id){
  const it=SHOP_THEMES.find(x=>x.id===id);
  if(!it||G.themes[id]||G.money<it.price)return;
  G.money-=it.price;G.themes[id]=true;G.curTheme=id;
  updateHUD();applyTheme();renderShop();toast(`🎨 "${it.name}" 테마 적용!`,'ok');
  saveGame();
}
function setTheme(id){
  if(!G.themes[id])return;
  G.curTheme=id;
  applyTheme();renderShop();
  saveGame();
}
function applyTheme(){
  document.body.classList.remove('theme-sakura','theme-night','theme-forest');
  if(G.curTheme && G.curTheme!=='default')document.body.classList.add('theme-'+G.curTheme);
}
function applyDecos(){
  const wrap=document.getElementById('shop-decos');
  let html='';
  SHOP_DECOS.forEach(d=>{
    if(G.decos[d.id] && G.decosOn[d.id]){
      const style=Object.entries(d.place||{}).map(([k,v])=>{
        const css=k.replace(/([A-Z])/g,m=>'-'+m.toLowerCase());
        return css+':'+v;
      }).join(';');
      const size=d.place&&d.place.fontSize?'':';font-size:24px';
      html+=`<span class="shop-deco" style="${style}${size}">${d.icon}</span>`;
    }
  });
  wrap.innerHTML=html;
}

function ensureDailyQuests(){
  // 하루가 바뀌면 새 일일 퀘스트 3개 선택
  if(G.lastQuestDay!==G.day){
    const pool=QUEST_DEFS.daily.slice();
    // 3개 랜덤
    const picked=[];
    for(let i=0;i<3 && pool.length;i++){
      const idx=rnd(0,pool.length-1);
      picked.push(pool[idx].id);
      pool.splice(idx,1);
    }
    G.dailyQuests=picked;
    G.lastQuestDay=G.day;
    // 일일 진행도/수령 초기화
    QUEST_DEFS.daily.forEach(q=>{
      delete G.questProgress[q.id];
      delete G.questClaimed[q.id];
    });
    saveGame();
  }
}

// isDaily=true 이면 일일 트래킹 값(오늘 기준), 아니면 누적
function updateProgress(track, value, isDailyValue){
  // 일일 퀘스트 중 이 track을 사용하는 것
  QUEST_DEFS.daily.forEach(q=>{
    if(q.track===track && G.dailyQuests.includes(q.id)){
      const prev=G.questProgress[q.id]||0;
      // isDailyValue는 값이 "오늘" 카운터인지. daily.track은 기본적으로 오늘 카운터
      if(value>prev)G.questProgress[q.id]=value;
    }
  });
  // 업적 퀘스트
  QUEST_DEFS.achieve.forEach(q=>{
    if(q.track===track){
      const prev=G.questProgress[q.id]||0;
      if(value>prev)G.questProgress[q.id]=value;
    }
  });
  updateQuestBadge();
}

function getClaimableCount(){
  let n=0;
  const all=[...QUEST_DEFS.daily.filter(q=>G.dailyQuests.includes(q.id)),...QUEST_DEFS.achieve];
  all.forEach(q=>{
    const prog=G.questProgress[q.id]||0;
    if(prog>=q.goal && !G.questClaimed[q.id])n++;
  });
  return n;
}
function updateQuestBadge(){
  const n=getClaimableCount();
  const b=document.getElementById('quest-badge');
  if(n>0){b.textContent=n;b.style.display='block';}else{b.style.display='none';}
}

function openQuests(){
  const dailyList=QUEST_DEFS.daily.filter(q=>G.dailyQuests.includes(q.id));
  const achList=QUEST_DEFS.achieve;
  const makeRow=q=>{
    const prog=Math.min(q.goal,G.questProgress[q.id]||0);
    const pct=Math.min(100,prog/q.goal*100);
    const done=prog>=q.goal;
    const claimed=!!G.questClaimed[q.id];
    return `<div class="quest-item${done?' done':''}${claimed?' claimed':''}">
      <div class="q-icon">${q.icon}</div>
      <div class="q-info">
        <div class="q-title">${q.title}</div>
        <div class="q-desc">${q.desc}</div>
        <div class="q-bar-bg"><div class="q-bar" style="width:${pct}%"></div></div>
        <div class="q-prog">${prog.toLocaleString()} / ${q.goal.toLocaleString()}</div>
      </div>
      ${claimed
        ? `<div class="q-reward">✓ 수령</div>`
        : done
          ? `<button class="q-claim-btn" onclick="claimQuest('${q.id}')">💰 ${q.reward.toLocaleString()}</button>`
          : `<div class="q-reward">+${q.reward.toLocaleString()}원</div>`
      }
    </div>`;
  };
  showOv(`<div class="ov-hd">
      <div class="ov-hd-info"><div class="ov-title">📜 목표 / 퀘스트</div><div class="ov-sub">Day ${G.day} · 💰 ${G.money.toLocaleString()}원</div></div>
      <button class="ov-close" onclick="closeOv()" title="닫기">✕</button>
    </div>
    <div class="ov-body">
      <div class="q-section-title">🌅 오늘의 퀘스트 (일일)</div>
      <div class="quest-list">${dailyList.map(makeRow).join('')||'<div style="font-size:11px;color:var(--text3);">퀘스트가 없어요.</div>'}</div>
      <div class="q-section-title">🏆 업적 (누적 목표)</div>
      <div class="quest-list">${achList.map(makeRow).join('')}</div>
    </div>`);
}

function claimQuest(id){
  const q=[...QUEST_DEFS.daily,...QUEST_DEFS.achieve].find(x=>x.id===id);
  if(!q)return;
  const prog=G.questProgress[id]||0;
  if(prog<q.goal || G.questClaimed[id])return;
  G.questClaimed[id]=true;
  G.money+=q.reward;
  updateHUD();
  toast(`🎁 "${q.title}" 보상 +${q.reward.toLocaleString()}원!`,'gold');
  saveGame();
  openQuests();
}

          "사용중"인 손님이 가게에 번갈아 나타나요!
        </div>

function loadImg(id,state,input){
  if(!input.files||!input.files[0])return;
  const r=new FileReader();
  r.onload=e=>{
    const c=CUSTS.find(x=>x.id===id);if(!c)return;
    c.imgs[state]=e.target.result;
    try{saveCustImages(c);}catch(err){toast('💾 저장 실패 (용량 초과일 수 있어요)','ng');}
    saveGame();
    const th=document.getElementById('th-'+id+'-'+state);if(th)th.src=e.target.result;
    // 현재 손님이면 즉시 반영
    const curClass=document.getElementById('cust-img').className;
    if(curClass!=='empty')setCustImg(curClass||'normal');
    toast('📷 이미지 저장됨!','ok');
    input.value='';
  };
  r.readAsDataURL(input.files[0]);
}
function toggleActive(id){
  const c=CUSTS.find(x=>x.id===id);if(c)c.active=!c.active;
  saveGame();renderSettingsOv();
}
function delCust(id){
  if(CUSTS.length<=1)return;
  deleteCustImages(id);
  CUSTS=CUSTS.filter(x=>x.id!==id);
  saveGame();renderSettingsOv();
  toast('🗑 손님 삭제됨','ng');
}
function addCust(){
  const i=CUSTS.length;
  const nc=makeDefaultCust(i);
  CUSTS.push(nc);
  saveGame();renderSettingsOv();
  toast(`👤 ${nc.name} 추가됨! (총 ${CUSTS.length}명)`,'ok');
}

        el.innerHTML='📲 앱으로 설치하려면<br>공유 → <b>홈 화면에 추가</b><br><span style="font-size:10px;opacity:.6;">탭해서 닫기</span>';
      } else {
        el.innerHTML='📲 앱으로 설치하려면<br>메뉴 → <b>앱 설치</b> 또는<br><b>홈 화면에 추가</b><br><span style="font-size:10px;opacity:.6;">탭해서 닫기</span>';
      }
      el.onclick=()=>el.remove();
      document.body.appendChild(el);
      setTimeout(()=>el&&el.remove(),7000);
    },2000);
  }
});
</script>
<script>
function renderStart(){
  const start = document.getElementById('start');
  const save = localStorage.getItem('save');

  start.innerHTML = `
    <h1>🍡 당고 가게</h1>
    ${
      save
      ? `<button onclick="continueGame()">이어하기</button>
         <button onclick="newGame()">새로하기</button>`
      : `<button onclick="newGame()">게임 시작</button>`
    }
  `;
}

function startGame(){
  document.getElementById('start').style.display = 'none';
  document.getElementById('game').style.display = 'block';

  document.getElementById('game').innerHTML = `
    <h2>게임 화면</h2>
    <button onclick="saveGame()">저장</button>
  `;
}

function newGame(){
  localStorage.setItem('save','yes');
  startGame();
}

function continueGame(){
  startGame();
}

function saveGame(){
  localStorage.setItem('save','yes');
  alert('저장됨');
}

renderStart();
</script>
</body>
</html>
