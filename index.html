<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#fff8f0;
  --pink:#f9c8d4;--pink2:#f0a0b4;--pink3:#d87090;
  --peach:#fde8d0;--peach2:#f8c8a0;
  --brown:#8b5e3c;--brown2:#6a4228;--brown3:#4a2e18;
  --sage:#a8c898;--sage2:#78a868;--sage3:#487848;
  --sky:#c8e4f8;--sky2:#90c4e8;
  --cream:#fff4e8;--cream2:#ffe8d0;--cream3:#f0d8c0;
  --text:#3a2010;--text2:#7a5030;--text3:#b89070;
  --white:#fffaf5;
  --shadow:rgba(80,30,10,.12);
}
html,body{height:100%;overflow:hidden;}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;
  height:100dvh;overflow:hidden;
}

/* ════ 헤더 ════ */
#hdr{
  flex-shrink:0;
  background:var(--white);
  border-bottom:2px solid var(--cream3);
  padding:6px 12px 5px;
  display:flex;flex-direction:column;gap:4px;
  box-shadow:0 2px 10px var(--shadow);
}
/* 헤더 1행: 타이틀 + 설정버튼 */
.hdr-row1{display:flex;align-items:center;justify-content:space-between;}
/* 헤더 2행: 스탯 + 타이머 */
.hdr-row2{display:flex;align-items:center;justify-content:space-between;gap:5px;}
.hdr-title{font-family:'Jua',sans-serif;font-size:16px;color:var(--brown2);}
.hdr-stats{display:flex;gap:5px;align-items:center;flex:1;}
.hchip{
  display:flex;align-items:center;gap:2px;
  background:var(--cream);border:1.5px solid var(--cream3);
  border-radius:20px;padding:2px 8px;font-size:11px;color:var(--text2);
  white-space:nowrap;flex-shrink:0;
}
.hchip b{font-family:'Jua',sans-serif;font-size:12px;color:var(--brown2);}
#hdr-timer{
  font-family:'Jua',sans-serif;font-size:14px;color:var(--brown2);
  background:var(--peach);border:1.5px solid var(--peach2);
  border-radius:20px;padding:2px 10px;flex-shrink:0;
}
#hdr-timer.urg{color:var(--pink3);border-color:var(--pink3);animation:urg .4s ease infinite alternate;}
@keyframes urg{from{opacity:.6}to{opacity:1}}
.hdr-btn{
  width:30px;height:30px;border-radius:50%;
  background:var(--cream);border:1.5px solid var(--cream3);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;cursor:pointer;transition:all .12s;flex-shrink:0;
}
.hdr-btn:hover{background:var(--cream2);}

/* ════ 가게 뷰 (손님) ════ */
#store{
  flex:1;min-height:60px;
  position:relative;
  overflow:hidden;
  background:linear-gradient(180deg,#f5d8c0 0%,#e8c8a8 60%,#d4a870 100%);
}
/* 벽 패턴 */
#store::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:
    repeating-linear-gradient(90deg,transparent 0,transparent 50px,rgba(180,120,80,.05) 50px,rgba(180,120,80,.05) 51px),
    repeating-linear-gradient(0deg,transparent 0,transparent 50px,rgba(180,120,80,.05) 50px,rgba(180,120,80,.05) 51px);
}
/* 메뉴판 */
#menu-sign{
  position:absolute;top:8px;left:50%;transform:translateX(-50%);
  background:var(--brown3);border:2px solid var(--brown2);
  border-radius:6px;padding:4px 16px;
  font-family:'Jua',sans-serif;font-size:11px;color:#f0d090;
  letter-spacing:.05em;white-space:nowrap;z-index:2;
}
/* 카운터 선 */
#counter-line{
  position:absolute;bottom:0;left:0;right:0;
  height:10px;
  background:linear-gradient(180deg,#e8c880,#c8a050);
  border-top:2px solid #f0d890;
  z-index:1;
}

/* 손님 + 말풍선 레이아웃 */
#customer-area{
  position:absolute;
  bottom:10px;left:0;right:0;
  display:flex;justify-content:center;align-items:flex-end;
  gap:12px;
  padding:0 12px;
  z-index:3;
}
#cust-wrap{
  display:flex;flex-direction:column;align-items:center;
}
#cust-img{
  width:clamp(100px,28vw,150px);
  height:clamp(130px,36vw,190px);
  object-fit:contain;object-position:center bottom;
  display:block;
  filter:drop-shadow(0 3px 8px rgba(0,0,0,.2));
  transition:filter .3s;
}
#cust-img.happy{filter:drop-shadow(0 3px 8px rgba(0,0,0,.2)) brightness(1.1) saturate(1.3);}
#cust-img.angry{filter:drop-shadow(0 3px 8px rgba(0,0,0,.2)) saturate(2) hue-rotate(-20deg) brightness(.85);}
#cust-tbar-wrap{width:clamp(100px,28vw,150px);height:5px;background:rgba(0,0,0,.1);border-radius:3px;overflow:hidden;margin-top:2px;}
#cust-tbar{height:5px;border-radius:3px;transition:width .3s,background .3s;background:var(--sage2);}

/* 말풍선 */
#speech-bubble{
  background:var(--white);
  border:2px solid var(--cream3);
  border-radius:14px;
  padding:8px 11px;
  max-width:min(210px, 55vw);min-width:120px;
  box-shadow:0 3px 14px var(--shadow);
  position:relative;
  align-self:flex-end;
  margin-bottom:20px;
  transition:opacity .25s,transform .25s;
}
#speech-bubble.hidden{opacity:0;transform:translateY(6px);pointer-events:none;}
#speech-bubble::after{
  content:'';position:absolute;
  bottom:-10px;left:24px;
  border:6px solid transparent;border-top-color:var(--cream3);
}
#speech-bubble::before{
  content:'';position:absolute;
  bottom:-8px;left:24px;z-index:1;
  border:6px solid transparent;border-top-color:var(--white);
}
#speech-bubble.wait{animation:bfloat 2.5s ease-in-out infinite alternate;}
@keyframes bfloat{from{transform:translateY(0);}to{transform:translateY(-4px);}}
#speech-bubble.happy{background:#edfce8;border-color:#8fcc78;}
#speech-bubble.happy::after{border-top-color:#8fcc78;}
#speech-bubble.happy::before{border-top-color:#edfce8;}
#speech-bubble.angry{background:#fce8ec;border-color:#f09090;}
#speech-bubble.angry::after{border-top-color:#f09090;}
#speech-bubble.angry::before{border-top-color:#fce8ec;}

.bub-title{font-family:'Jua',sans-serif;font-size:13px;color:var(--text);margin-bottom:5px;}
.bub-skewers{display:flex;flex-direction:column;gap:3px;margin-bottom:4px;}
.bub-skewer-row{display:flex;align-items:center;gap:4px;}
.bub-sauce-row{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text2);}
.bub-sauce-row b{color:var(--brown2);}
.bub-msg{font-size:12px;font-weight:700;text-align:center;padding:2px 0;}

/* ════ 제작 디스플레이 ════ */
#craft-display{
  flex-shrink:0;
  height:100px;
  background:var(--white);
  border-top:3px solid var(--peach2);
  border-bottom:2px solid var(--cream3);
  position:relative;
  overflow:hidden;
}
/* 상태텍스트 — 위에 고정, 레이아웃 영향 없음 */
#craft-status{
  position:absolute;
  top:5px;left:0;right:0;
  text-align:center;
  font-family:'Jua',sans-serif;font-size:11px;color:var(--text3);
  letter-spacing:.03em;
  pointer-events:none;z-index:1;
}
#craft-status em{color:var(--pink3);font-style:normal;font-size:12px;}
/* 꼬치 시각화 — 항상 정중앙 고정 */
#craft-skewer-area{
  position:absolute;
  top:50%;left:0;right:0;
  transform:translateY(-50%);
  display:flex;align-items:center;justify-content:center;
  height:56px;
  overflow:visible;
}
/* 완성된 꼬치들 — 아래에 고정 */
#done-skewers{
  position:absolute;
  bottom:4px;left:0;right:0;
  display:flex;gap:5px;align-items:center;flex-wrap:nowrap;justify-content:center;
  height:16px;
  overflow:hidden;
  pointer-events:none;
}
.done-sk{
  font-size:13px;
  background:var(--cream);border:1.5px solid var(--cream3);
  border-radius:8px;padding:1px 6px;
  animation:doneAnim .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes doneAnim{from{transform:scale(0);}to{transform:scale(1);}}

/* 꼬치 막대 구조 */
#craft-current{display:flex;flex-direction:column;align-items:center;}
#craft-stick-wrap{
  position:relative;
  display:flex;align-items:center;
  height:48px;
}
#craft-stick-bg{
  width:148px;height:8px;
  border-radius:4px;
  background:linear-gradient(90deg,#f0d890,#c8a040);
  box-shadow:0 2px 4px rgba(0,0,0,.15);
  flex-shrink:0;
}
#craft-handle{
  width:12px;height:22px;border-radius:3px;
  background:linear-gradient(180deg,#a06030,#7a4020);
  margin-left:3px;flex-shrink:0;
  box-shadow:1px 2px 4px rgba(0,0,0,.25);
}
#craft-balls-wrap{
  position:absolute;
  left:6px;top:50%;transform:translateY(-50%);
  display:flex;align-items:center;gap:2px;
  pointer-events:none;
}

/* ════ 제작대 (선택 버튼) ════ */
#bench{
  flex-shrink:0;
  background:var(--brown2);
  padding:8px 10px;
  display:flex;flex-direction:column;gap:6px;
  overflow-y:auto;
  /* 화면의 42% 고정 — store+craft-display가 나머지 차지 */
  height:55vh;
  max-height:55vh;
  padding-bottom:max(10px, env(safe-area-inset-bottom));
}
/* 서빙 + 초기화 */
#serve-rst-row{display:flex;gap:6px;}
#serve-btn{
  flex:1;font-family:'Jua',sans-serif;font-size:14px;
  padding:10px;min-height:48px;border:none;border-radius:10px;
  background:rgba(255,255,255,.12);color:rgba(255,255,255,.3);
  cursor:not-allowed;transition:all .18s;
}
#serve-btn.on{
  background:var(--sage2);color:#fff;cursor:pointer;
  box-shadow:0 3px 0 var(--sage3),0 4px 12px rgba(72,120,72,.3);
}
#serve-btn.on:active{transform:translateY(2px);box-shadow:0 1px 0 var(--sage3);}
#rst-btn{
  width:42px;height:42px;border-radius:10px;
  background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);
  font-size:18px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;color:#fff;
}
#rst-btn:active{background:rgba(255,255,255,.18);}

/* 섹션 */
.bench-section{flex-shrink:0;}
.bench-lbl{
  font-size:9px;font-weight:700;color:rgba(255,255,255,.45);
  letter-spacing:.08em;text-transform:uppercase;
  margin-bottom:4px;
}
.pick-row{display:flex;gap:5px;flex-wrap:wrap;}

/* 꼬치 수 버튼 */
.skewer-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 10px;min-width:56px;min-height:48px;justify-content:center;
  background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.18);
  border-radius:10px;cursor:pointer;transition:all .12s;
}
.skewer-btn:active{transform:scale(.93);}
.skewer-btn.sel{background:var(--pink);border-color:var(--pink3);}
.skewer-icon{font-size:16px;line-height:1.2;letter-spacing:-3px;}
.skewer-name{font-size:8px;color:rgba(255,255,255,.6);font-weight:700;}
.skewer-btn.sel .skewer-name{color:var(--brown2);}

/* 당고 버튼 */
.dango-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:7px 5px;min-width:50px;min-height:48px;justify-content:center;
  background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.18);
  border-radius:10px;cursor:pointer;transition:all .12s;
}
.dango-btn:active{transform:scale(.93);}
.dango-emoji{font-size:20px;line-height:1;}
.dango-name{font-size:8px;color:rgba(255,255,255,.6);}

/* 소스 버튼 */
.sauce-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:7px 5px;min-width:50px;min-height:48px;justify-content:center;
  background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.18);
  border-radius:10px;cursor:pointer;transition:all .12s;
}
.sauce-btn:active{transform:scale(.93);}
.sauce-btn.sel{background:var(--sky);border-color:var(--sky2);}
.sauce-emoji{font-size:20px;line-height:1;}
.sauce-name{font-size:8px;color:rgba(255,255,255,.6);}
.sauce-btn.sel .sauce-name{color:var(--brown2);}

/* ════ 토스트 ════ */
#toast{
  position:fixed;top:54px;left:50%;transform:translateX(-50%);
  font-size:11px;font-weight:700;padding:6px 16px;border-radius:18px;
  background:var(--brown2);color:var(--cream);
  z-index:300;opacity:0;transition:opacity .2s;pointer-events:none;
  white-space:nowrap;box-shadow:0 3px 10px var(--shadow);
}
#toast.show{opacity:1;}
#toast.ok{background:var(--sage2);}
#toast.ng{background:var(--pink3);}
#toast.gold{background:#c89820;color:#fff8e0;}

/* ════ 오버레이 ════ */
#overlay{
  display:none;position:fixed;inset:0;
  background:rgba(58,32,16,.85);z-index:100;
  align-items:center;justify-content:center;padding:16px;
}
#overlay.show{display:flex;}
.ov-card{
  background:var(--white);border-radius:22px;
  border:3px solid var(--cream3);width:100%;max-width:380px;
  box-shadow:0 8px 40px rgba(80,30,10,.3);overflow:hidden;
}
.ov-hd{
  background:var(--brown2);padding:13px 16px;
  display:flex;align-items:center;justify-content:space-between;
}
.ov-title{font-family:'Jua',sans-serif;font-size:17px;color:var(--cream);}
.ov-sub{font-size:11px;color:rgba(253,232,208,.7);}
.ov-body{padding:14px 16px;max-height:70vh;overflow-y:auto;}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:13px;}
.stat-box{background:var(--cream);border-radius:10px;padding:10px;border:1.5px solid var(--cream3);}
.stat-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;}
.stat-val{font-family:'Jua',sans-serif;font-size:20px;color:var(--text);margin-top:2px;}
.stars{font-size:26px;text-align:center;margin-bottom:10px;}
.btn-row{display:flex;gap:8px;justify-content:center;padding:4px 0 0;}
.abtn{font-family:'Jua',sans-serif;font-size:13px;padding:10px 20px;border:none;border-radius:50px;cursor:pointer;}
.abtn.sage{background:var(--sage2);color:#fff;box-shadow:0 3px 0 var(--sage3);}
.abtn.pink{background:var(--pink3);color:#fff;box-shadow:0 3px 0 #b05070;}
.abtn.brown{background:var(--brown2);color:var(--cream);box-shadow:0 3px 0 var(--brown3);}
/* 상점 */
.shop-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;}
.shop-item{background:var(--cream);border:2px solid var(--cream3);border-radius:12px;padding:10px;}
.shop-item.owned{border-color:var(--sage2);}
.si-icon{font-size:22px;margin-bottom:3px;}
.si-name{font-size:11px;font-weight:700;color:var(--text);margin-bottom:2px;}
.si-desc{font-size:9px;color:var(--text3);line-height:1.5;margin-bottom:6px;}
.si-btn{font-family:'Jua',sans-serif;font-size:10px;padding:5px 8px;border:none;border-radius:8px;cursor:pointer;width:100%;}
.si-btn.buy{background:var(--sage2);color:#fff;}
.si-btn.cant{background:var(--cream2);color:var(--text3);cursor:not-allowed;}
.si-btn.have{background:#d1fae5;color:var(--sage3);cursor:default;}
/* 설정 */
.setting-section{margin-bottom:14px;}
.setting-title{font-family:'Jua',sans-serif;font-size:13px;color:var(--brown2);margin-bottom:8px;}
.cust-setting-grid{display:flex;flex-direction:column;gap:8px;}
.cust-entry{background:var(--cream);border:1.5px solid var(--cream3);border-radius:12px;padding:10px;display:flex;align-items:center;gap:10px;}
.cust-entry-imgs{display:flex;gap:5px;}
.img-upload-box{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;}
.img-thumb{
  width:42px;height:50px;border-radius:6px;
  object-fit:contain;object-position:center bottom;
  border:2px solid var(--cream3);background:var(--cream2);
  transition:border-color .15s;
}
.img-upload-box:hover .img-thumb{border-color:var(--pink2);}
.img-lbl{font-size:8px;font-weight:700;}
.img-lbl.normal{color:var(--text3);}
.img-lbl.happy{color:var(--sage2);}
.img-lbl.angry{color:var(--pink3);}
.cust-entry-info{flex:1;}
.cust-name-input{
  font-family:'Noto Sans KR',sans-serif;font-size:13px;
  width:100%;background:var(--white);border:1.5px solid var(--cream3);
  border-radius:8px;padding:5px 10px;color:var(--text);outline:none;margin-bottom:5px;
}
.cust-name-input:focus{border-color:var(--pink2);}
.cust-btns{display:flex;gap:5px;flex-wrap:wrap;}
.cust-use-btn{font-size:10px;padding:4px 10px;border-radius:20px;border:1.5px solid;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.cust-use-btn.active{background:var(--sage2);border-color:var(--sage3);color:#fff;}
.cust-use-btn.inactive{background:transparent;border-color:var(--cream3);color:var(--text3);}
.cust-del-btn{font-size:10px;padding:4px 10px;border-radius:20px;border:1.5px solid var(--pink2);background:transparent;color:var(--pink3);cursor:pointer;}
.add-cust-btn{width:100%;padding:10px;border-radius:12px;border:2px dashed var(--cream3);background:transparent;font-family:'Jua',sans-serif;font-size:13px;color:var(--text3);cursor:pointer;transition:all .15s;}
.add-cust-btn:hover{border-color:var(--pink2);color:var(--pink3);background:var(--pink);}
input.hidden-file{display:none;}
</style>
</head>
<body>

<!-- 헤더 -->
<div id="hdr">
  <div class="hdr-row1">
    <div class="hdr-title">🍡 당고집</div>
    <div class="hdr-btn" onclick="openSettings()">⚙️</div>
  </div>
  <div class="hdr-row2">
    <div class="hdr-stats">
      <div class="hchip">📅 <b id="h-day">Day1</b></div>
      <div class="hchip">💰 <b id="h-money">0</b>원</div>
      <div class="hchip">😊 <b id="h-happy">0</b></div>
    </div>
    <div id="hdr-timer">1:00</div>
  </div>
</div>

<!-- 가게 뷰 -->
<div id="store">
  <div id="menu-sign">🍡 당고집 · 오늘도 맛있는 당고!</div>
  <div id="counter-line"></div>
  <div id="customer-area">
    <div id="speech-bubble" class="hidden"></div>
    <div id="cust-wrap">
      <img id="cust-img" src="" alt="손님">
      <div id="cust-tbar-wrap"><div id="cust-tbar"></div></div>
    </div>
  </div>
</div>

<!-- 제작 디스플레이 -->
<div id="craft-display">
  <div id="craft-status">꼬치 개수를 먼저 골라요!</div>
  <div id="craft-skewer-area">
    <div id="craft-current">
      <div id="craft-stick-wrap">
        <div id="craft-stick-bg"></div>
        <div id="craft-handle"></div>
        <div id="craft-balls-wrap"></div>
      </div>
    </div>
  </div>
  <div id="done-skewers"></div>
</div>

<!-- 제작대 -->
<div id="bench">
  <div id="serve-rst-row">
    <button id="serve-btn" onclick="doServe()">🍱 서빙!</button>
    <button id="rst-btn" onclick="resetCraft()" title="초기화">🗑</button>
  </div>

  <div class="bench-section">
    <div class="bench-lbl">🍢 꼬치 개수</div>
    <div class="pick-row" id="skewer-row">
      <div class="skewer-btn" onclick="setSkewer(1)" data-sk="1"><span class="skewer-icon">🍡</span><span class="skewer-name">1개</span></div>
      <div class="skewer-btn" onclick="setSkewer(2)" data-sk="2"><span class="skewer-icon">🍡🍡</span><span class="skewer-name">2개</span></div>
      <div class="skewer-btn" onclick="setSkewer(3)" data-sk="3"><span class="skewer-icon">🍡🍡🍡</span><span class="skewer-name">3개</span></div>
    </div>
  </div>

  <div class="bench-section">
    <div class="bench-lbl">🔴 당고 종류</div>
    <div class="pick-row" id="dango-row"></div>
  </div>

  <div class="bench-section">
    <div class="bench-lbl">🍯 소스</div>
    <div class="pick-row" id="sauce-row">
      <div class="sauce-btn" onclick="setSauce('mitarashi')" data-s="mitarashi"><span class="sauce-emoji">🍯</span><span class="sauce-name">미타라시</span></div>
      <div class="sauce-btn" onclick="setSauce('kinako')" data-s="kinako"><span class="sauce-emoji">🟡</span><span class="sauce-name">키나코</span></div>
      <div class="sauce-btn" onclick="setSauce('anko')" data-s="anko"><span class="sauce-emoji">🫘</span><span class="sauce-name">팥앙금</span></div>
      <div class="sauce-btn" onclick="setSauce('matcha')" data-s="matcha"><span class="sauce-emoji">🍵</span><span class="sauce-name">말차</span></div>
      <div class="sauce-btn" onclick="setSauce('plain')" data-s="plain"><span class="sauce-emoji">✖️</span><span class="sauce-name">없음</span></div>
    </div>
  </div>
</div>

<div id="overlay"><div class="ov-card" id="ov-card"></div></div>
<div id="toast"></div>

<script>
// ══════ 데이터 ══════
const DANGOS=[
  {id:'white',  emoji:'⚪',name:'흰 당고'},
  {id:'pink',   emoji:'🟣',name:'분홍 당고'},
  {id:'green',  emoji:'🟢',name:'말차 당고'},
  {id:'sesame', emoji:'⚫',name:'참깨 당고'},
  {id:'sakura', emoji:'🌸',name:'벚꽃 당고'},
  {id:'strawb', emoji:'🔴',name:'딸기 당고'},
  {id:'yuzu',   emoji:'🟡',name:'유자 당고'},
  {id:'mochi',  emoji:'🟤',name:'모치 당고'},
];
const SAUCES={
  mitarashi:{label:'미타라시',emoji:'🍯'},
  kinako:   {label:'키나코',  emoji:'🟡'},
  anko:     {label:'팥앙금',  emoji:'🫘'},
  matcha:   {label:'말차',    emoji:'🍵'},
  plain:    {label:'없음',    emoji:'✖️'},
};
const MENUS=[
  {skewer:1, dangos:{white:3},               sauce:'mitarashi', base:1800},
  {skewer:1, dangos:{pink:3},                sauce:'anko',      base:2000},
  {skewer:1, dangos:{green:3},               sauce:'matcha',    base:2200},
  {skewer:1, dangos:{sesame:3},              sauce:'kinako',    base:2000},
  {skewer:1, dangos:{sakura:3},              sauce:'plain',     base:2400},
  {skewer:1, dangos:{strawb:3},              sauce:'plain',     base:2200},
  {skewer:1, dangos:{white:1,pink:1,green:1},sauce:'mitarashi', base:2600},
  {skewer:1, dangos:{pink:1,sesame:1,white:1},sauce:'anko',     base:2600},
  {skewer:2, dangos:{white:3},               sauce:'mitarashi', base:3600},
  {skewer:2, dangos:{green:3},               sauce:'matcha',    base:3800},
  {skewer:2, dangos:{white:1,pink:1,green:1},sauce:'kinako',    base:4200},
  {skewer:3, dangos:{white:3},               sauce:'mitarashi', base:5200},
  {skewer:3, dangos:{white:1,green:1,pink:1},sauce:'plain',     base:5800},
  {skewer:2, dangos:{yuzu:1,sakura:1,strawb:1},sauce:'plain',   base:4400},
  {skewer:1, dangos:{mochi:3},               sauce:'kinako',    base:2400},
];
const SHOP_ITEMS=[
  {id:'tip',  icon:'💸',name:'단골 손님',  desc:'서빙 성공 시 +300원 팁',  price:4000},
  {id:'timer',icon:'⏰',name:'느긋한 손님',desc:'손님 인내심 +8초',        price:7000},
  {id:'combo',icon:'🔥',name:'콤보 보너스',desc:'3콤보마다 +1,500원',      price:10000},
  {id:'hint', icon:'💡',name:'주문 강조',  desc:'일치 시 서빙 버튼 강조',  price:6000},
];

// ══════ SVG 기본 캐릭터 ══════
function makeSVG(hair,skin,exp){
  let eyes='',mouth='',cheek='';
  if(exp==='normal'){
    eyes=`<ellipse cx='26' cy='32' rx='3.5' ry='4' fill='%23333'/><ellipse cx='42' cy='32' rx='3.5' ry='4' fill='%23333'/><circle cx='27' cy='31' r='1.2' fill='white'/><circle cx='43' cy='31' r='1.2' fill='white'/>`;
    mouth=`<path d='M28 42 Q34 47 40 42' stroke='%23a06040' stroke-width='2' fill='none' stroke-linecap='round'/>`;
  } else if(exp==='happy'){
    eyes=`<path d='M22 30 Q26 26 30 30' stroke='%23333' stroke-width='2.5' fill='none' stroke-linecap='round'/><path d='M38 30 Q42 26 46 30' stroke='%23333' stroke-width='2.5' fill='none' stroke-linecap='round'/>`;
    mouth=`<path d='M26 42 Q34 50 42 42' stroke='%23d06080' stroke-width='2.5' fill='none' stroke-linecap='round'/>`;
    cheek=`<ellipse cx='18' cy='40' rx='7' ry='4.5' fill='%23f090a0' opacity='.4'/><ellipse cx='50' cy='40' rx='7' ry='4.5' fill='%23f090a0' opacity='.4'/>`;
  } else {
    eyes=`<path d='M22 32 Q26 28 30 32' stroke='%23333' stroke-width='2.5' fill='none' stroke-linecap='round'/><line x1='20' y1='26' x2='30' y2='30' stroke='%23555' stroke-width='2'/><path d='M38 32 Q42 28 46 32' stroke='%23333' stroke-width='2.5' fill='none' stroke-linecap='round'/><line x1='38' y1='30' x2='48' y2='26' stroke='%23555' stroke-width='2'/>`;
    mouth=`<path d='M26 48 Q34 42 42 48' stroke='%23a03020' stroke-width='2.5' fill='none' stroke-linecap='round'/>`;
  }
  const s=`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 68 90'>
    <rect x='0' y='50' width='68' height='40' rx='8' fill='${skin}' opacity='.9'/>
    <ellipse cx='34' cy='28' rx='22' ry='26' fill='${skin}'/>
    <ellipse cx='34' cy='28' rx='20' ry='24' fill='%23fcd9b0'/>
    <rect x='13' y='5' width='42' height='26' rx='4' fill='${hair}'/>
    <ellipse cx='34' cy='8' rx='22' ry='12' fill='${hair}'/>
    ${eyes}${cheek}${mouth}
  </svg>`;
  return 'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(s);
}
const HAIR_COLORS=['#5a3010','#1a1a2a','#8b5e3c','#c0a040','#4a2a7a','#c05080'];
const SKIN_COLORS=['%23fcd9b0','%23f0b888','%23d4906a','%23c07850'];

// ══════ 손님 관리 ══════
let CUSTS=[
  {id:'c1',name:'하나짱',imgs:{normal:null,happy:null,angry:null},
   defImgs:{normal:makeSVG('#5a3010','%23fcd9b0','normal'),happy:makeSVG('#5a3010','%23fcd9b0','happy'),angry:makeSVG('#5a3010','%23fcd9b0','angry')},active:true},
  {id:'c2',name:'타로군',imgs:{normal:null,happy:null,angry:null},
   defImgs:{normal:makeSVG('#1a1a2a','%23f0b888','normal'),happy:makeSVG('#1a1a2a','%23f0b888','happy'),angry:makeSVG('#1a1a2a','%23f0b888','angry')},active:false},
];
let activeCustIdx=0; // 현재 등장 중인 손님 인덱스

// ══════ 게임 상태 ══════
const G={
  day:1,money:0,happy:0,angry:0,combo:0,bestCombo:0,
  total:0,correct:0,sec:60,tint:null,
  cust:null,ctimer:null,
  buffs:{tip:false,timer:false,combo:false,hint:false},
  skewer:0,curBalls:[],doneSkewers:[],sauce:null,
  dayMoney:0,dayHappy:0,
};
const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;

function getActiveCusts(){return CUSTS.filter(c=>c.active);}
function getCustImg(state){
  const list=getActiveCusts();
  if(!list.length)return makeSVG('#5a3010','%23fcd9b0',state);
  const c=list[activeCustIdx%list.length];
  return c.imgs[state]||c.defImgs[state];
}
function setCustImg(state){
  const img=document.getElementById('cust-img');
  img.src=getCustImg(state);
  img.className=state==='normal'?'':state;
}

// ══════ 시작 ══════
window.onload=()=>{
  buildDangoRow();
  setCustImg('normal');
  updateCraftDisplay();
  startDay();
};

function startDay(){
  G.sec=Math.max(40,63-G.day*3);
  G.dayMoney=0;G.dayHappy=0;G.total=0;G.correct=0;G.combo=0;
  document.getElementById('h-day').textContent='Day'+G.day;
  document.getElementById('hdr-timer').classList.remove('urg');
  updateTimerDisplay();
  G.tint=setInterval(tick,1000);
  updateHUD();resetCraft();
  setTimeout(spawnCust,1000);
}
function tick(){
  G.sec--;updateTimerDisplay();
  if(G.sec<=15)document.getElementById('hdr-timer').classList.add('urg');
  if(G.sec<=0){clearInterval(G.tint);endDay();}
}
function updateTimerDisplay(){
  const m=Math.floor(G.sec/60),s=G.sec%60;
  document.getElementById('hdr-timer').textContent=m+':'+(s<10?'0':'')+s;
}

// ══════ 손님 ══════
function getLvMenus(){
  if(G.day<=2)return MENUS.slice(0,7);
  if(G.day<=4)return MENUS.slice(0,11);
  return MENUS;
}
function getTL(){return G.buffs.timer?28000:20000;}

function spawnCust(){
  if(G.sec<=0)return;
  const list=getActiveCusts();
  if(list.length>1) activeCustIdx=(activeCustIdx+1)%list.length;
  const menu=getLvMenus()[rnd(0,getLvMenus().length-1)];
  G.cust={menu,tl:getTL(),maxTl:getTL()};
  setCustImg('normal');
  showBubble('order',menu);
  setTbar(100,'var(--sage2)');
  if(G.ctimer)clearInterval(G.ctimer);
  G.ctimer=setInterval(()=>{
    if(!G.cust)return;
    G.cust.tl-=200;
    const pct=Math.max(0,G.cust.tl/G.cust.maxTl*100);
    const bc=pct>55?'var(--sage2)':pct>25?'var(--peach2)':'var(--pink3)';
    setTbar(pct,bc);
    if(G.cust.tl<=0){clearInterval(G.ctimer);loseC();}
  },200);
}
function loseC(){
  G.cust=null;G.angry++;G.combo=0;
  setCustImg('angry');showBubble('angry');updateHUD();
  toast('😤 손님이 화내며 가셨어요!','ng');
  setTimeout(()=>{
    showBubble('hidden');setCustImg('normal');setTbar(100,'var(--sage2)');
    if(G.sec>0)setTimeout(spawnCust,1800);
  },1800);
}
function setTbar(pct,color){
  const b=document.getElementById('cust-tbar');
  b.style.width=pct+'%';b.style.background=color;
}

// ══════ 말풍선 ══════
function showBubble(type,menu){
  const el=document.getElementById('speech-bubble');
  el.className='bubble';
  if(type==='hidden'){el.classList.add('hidden');el.innerHTML='';return;}
  if(type==='happy'){el.classList.add('happy');el.innerHTML='<div class="bub-msg">😋 최고예요!</div>';return;}
  if(type==='angry'){el.classList.add('angry');el.innerHTML='<div class="bub-msg">😡 너무 오래 기다렸어요!</div>';return;}
  if(type==='order'&&menu){
    el.classList.add('wait');
    // 꼬치별 SVG
    function skSVG(dangos){
      const balls=[];
      Object.entries(dangos).forEach(([id,cnt])=>{
        const d=DANGOS.find(x=>x.id===id);
        if(d)for(let i=0;i<cnt;i++)balls.push(d.emoji);
      });
      const n=balls.length||3;
      const W=n*24+20,H=30;
      const bals=balls.map((e,i)=>`<text x="${10+(i+.5)*24}" y="${H/2+8}" font-size="20" text-anchor="middle">${e}</text>`).join('');
      return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="${H/2-3}" width="${W-4}" height="6" rx="3" fill="#c8a060"/>
        ${bals}
        <rect x="${W-7}" y="${H/2-8}" width="5" height="16" rx="2" fill="#8b5e3c"/>
      </svg>`;
    }
    const skHtml=Array.from({length:menu.skewer},()=>
      `<div class="bub-skewer-row">${skSVG(menu.dangos)}</div>`
    ).join('');
    const si=SAUCES[menu.sauce];
    el.innerHTML=`
      <div class="bub-title">주문할게요!</div>
      <div class="bub-skewers">${skHtml}</div>
      <div class="bub-sauce-row">${si.emoji} 소스: <b>${si.label}</b></div>`;
  }
}

// ══════ 제작 ══════
function buildDangoRow(){
  const row=document.getElementById('dango-row');row.innerHTML='';
  DANGOS.forEach(d=>{
    const btn=document.createElement('div');
    btn.className='dango-btn';btn.id='db-'+d.id;
    btn.innerHTML=`<span class="dango-emoji">${d.emoji}</span><span class="dango-name">${d.name}</span>`;
    btn.onclick=()=>addDango(d.id);
    row.appendChild(btn);
  });
}

function setSkewer(n){
  G.skewer=n;G.curBalls=[];G.doneSkewers=[];
  document.querySelectorAll('[data-sk]').forEach(b=>b.classList.toggle('sel',+b.dataset.sk===n));
  updateCraftDisplay();checkReady();
}

function addDango(id){
  if(!G.skewer){toast('꼬치 개수를 먼저 골라요!','ng');return;}
  if(G.doneSkewers.length>=G.skewer){toast('꼬치를 다 만들었어요! 소스 선택 후 서빙하세요.','ng');return;}
  if(G.curBalls.length>=3){toast('당고 3개가 꽉 찼어요!','ng');return;}
  const d=DANGOS.find(x=>x.id===id);if(!d)return;
  G.curBalls.push({id,emoji:d.emoji,name:d.name});
  if(G.curBalls.length===3){
    G.doneSkewers.push([...G.curBalls]);
    G.curBalls=[];
    const remaining=G.skewer-G.doneSkewers.length;
    if(remaining>0) toast(`🍡 꼬치 완성! 다음 꼬치를 만들어요 (${remaining}개 남음)`, 'ok');
    else toast(`🍡 꼬치 ${G.skewer}개 완성! 소스를 골라서 서빙해요!`,'ok');
  }
  updateCraftDisplay();checkReady();
}

function updateCraftDisplay(){
  const statusEl=document.getElementById('craft-status');
  const ballsWrap=document.getElementById('craft-balls-wrap');
  const doneEl=document.getElementById('done-skewers');
  const stickBg=document.getElementById('craft-stick-bg');

  const done=G.doneSkewers.length, target=G.skewer;

  // 상태 텍스트
  if(!target){
    statusEl.innerHTML='꼬치 개수를 먼저 골라요!';
  } else if(done>=target){
    statusEl.innerHTML=`✅ 꼬치 ${target}개 완성! <em>소스 선택 후 서빙!</em>`;
  } else {
    statusEl.innerHTML=`🍡 ${done+1}번째 꼬치 — 당고 <em>${G.curBalls.length}/3</em>개`;
  }

  // 현재 꼬치 시각화
  const totalSlots=3;
  const stickW=Math.max(90, totalSlots*36+24);
  stickBg.style.minWidth=stickW+'px';

  // 당고 볼
  const allBalls=[...G.curBalls];
  const emptyCount=totalSlots-allBalls.length;
  let ballsHTML=allBalls.map(b=>`<span class="craft-ball">${b.emoji}</span>`).join('');
  if(target>0 && done<target){
    for(let i=0;i<emptyCount;i++){
      ballsHTML+=`<span class="craft-ball-empty"><svg width="36" height="36" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><circle cx="18" cy="18" r="14" fill="none" stroke="rgba(160,100,60,.35)" stroke-width="2.5" stroke-dasharray="5 4"/></svg></span>`;
    }
  }
  ballsWrap.innerHTML=ballsHTML;

  // 완성된 꼬치
  doneEl.innerHTML=G.doneSkewers.map((sk,i)=>`
    <span class="done-sk" title="${i+1}번째 꼬치">${sk.map(b=>b.emoji).join('')}🍢</span>
  `).join('');
}

function setSauce(s){
  G.sauce=s;
  document.querySelectorAll('[data-s]').forEach(b=>b.classList.toggle('sel',b.dataset.s===s));
  checkReady();
}

function checkReady(){
  const allDone=G.skewer>0&&G.doneSkewers.length>=G.skewer;
  const ok=allDone&&!!G.sauce;
  const btn=document.getElementById('serve-btn');
  btn.className=ok?'on':'';
  btn.style.boxShadow=(ok&&G.buffs.hint&&G.cust&&orderMatch())
    ?'0 3px 0 var(--sage3),0 0 0 3px rgba(100,180,100,.4)':'';
}

function orderMatch(){
  if(!G.cust)return false;
  const m=G.cust.menu;
  if(G.skewer!==m.skewer)return false;
  const ref=G.doneSkewers[0]||[];
  const my={};
  ref.forEach(b=>{my[b.id]=(my[b.id]||0)+1;});
  const ok=Object.keys(m.dangos),ck=Object.keys(my);
  if(ok.length!==ck.length)return false;
  for(const k of ok){if((my[k]||0)!==m.dangos[k])return false;}
  if(G.sauce!==m.sauce)return false;
  return true;
}

function doServe(){
  const allDone=G.skewer>0&&G.doneSkewers.length>=G.skewer;
  if(!allDone||!G.sauce)return;
  if(!G.cust){toast('지금 손님이 없어요!','ng');return;}
  const matched=orderMatch();
  const savedMenu=G.cust.menu;
  clearInterval(G.ctimer);G.cust=null;G.total++;
  if(matched){
    G.correct++;G.combo++;if(G.combo>G.bestCombo)G.bestCombo=G.combo;
    let price=savedMenu.base;
    if(G.buffs.tip)price+=300;
    if(G.buffs.combo&&G.combo%3===0){price+=1500;toast(`🔥 ${G.combo}콤보! +1,500원!`,'gold');}
    G.money+=price;G.dayMoney+=price;G.happy++;G.dayHappy++;
    setCustImg('happy');showBubble('happy');setTbar(100,'var(--sage2)');
    updateHUD();toast(`😋 완벽! +${price.toLocaleString()}원 ✨`,'ok');
    if(G.happy>0&&G.happy%8===0&&G.day<10){G.day++;document.getElementById('h-day').textContent='Day'+G.day;toast(`🎉 Day${G.day}!`,'gold');}
  } else {
    G.combo=0;G.angry++;
    setCustImg('angry');showBubble('angry');
    toast('⚠️ 주문이랑 달라요!','ng');updateHUD();
  }
  setTimeout(()=>{showBubble('hidden');setCustImg('normal');setTbar(100,'var(--sage2)');if(G.sec>0)setTimeout(spawnCust,1500);},1800);
  resetCraft();
}

function resetCraft(){
  G.skewer=0;G.curBalls=[];G.doneSkewers=[];G.sauce=null;
  document.querySelectorAll('[data-sk],[data-s]').forEach(b=>b.classList.remove('sel'));
  updateCraftDisplay();checkReady();
}

// ══════ 영업 마감 ══════
function endDay(){
  clearInterval(G.ctimer);
  const acc=G.total?Math.round(G.correct/G.total*100):0;
  const stars=G.dayHappy>=8?'⭐⭐⭐':G.dayHappy>=4?'⭐⭐':'⭐';
  showOv(`<div class="ov-hd"><div class="ov-title">🍡 오늘 영업 종료!</div><div class="ov-sub">Day ${G.day}</div></div>
    <div class="ov-body">
      <div class="stars">${stars}</div>
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-lbl">오늘 수익</div><div class="stat-val">${G.dayMoney.toLocaleString()}원</div></div>
        <div class="stat-box"><div class="stat-lbl">만족 손님</div><div class="stat-val">${G.dayHappy}명</div></div>
        <div class="stat-box"><div class="stat-lbl">최고 콤보</div><div class="stat-val">${G.bestCombo}콤보</div></div>
        <div class="stat-box"><div class="stat-lbl">정확도</div><div class="stat-val">${acc}%</div></div>
      </div>
      <div class="btn-row">
        <button class="abtn sage" onclick="openShop()">🛒 상점</button>
        <button class="abtn pink" onclick="nextDay()">🌅 다음 날</button>
      </div>
    </div>`);
}
function nextDay(){
  G.day++;closeOv();resetCraft();
  showBubble('hidden');setCustImg('normal');setTbar(100,'var(--sage2)');
  startDay();
}

// ══════ 상점 ══════
function openShop(){
  const items=SHOP_ITEMS.map(it=>{
    const owned=G.buffs[it.id],can=!owned&&G.money>=it.price;
    return `<div class="shop-item${owned?' owned':''}">
      <div class="si-icon">${it.icon}</div>
      <div class="si-name">${it.name}</div>
      <div class="si-desc">${it.desc}</div>
      <button class="si-btn ${owned?'have':can?'buy':'cant'}" onclick="buyItem('${it.id}')">
        ${owned?'✓ 보유':can?'💰 '+it.price.toLocaleString()+'원':'💸 '+it.price.toLocaleString()+'원'}
      </button>
    </div>`;
  }).join('');
  showOv(`<div class="ov-hd"><div class="ov-title">🛒 상점</div><div class="ov-sub">💰 ${G.money.toLocaleString()}원</div></div>
    <div class="ov-body"><div class="shop-grid">${items}</div>
    <div class="btn-row"><button class="abtn brown" onclick="endDay()">← 돌아가기</button></div>
    </div>`);
}
function buyItem(id){
  const it=SHOP_ITEMS.find(x=>x.id===id);
  if(!it||G.buffs[id]||G.money<it.price)return;
  G.money-=it.price;G.buffs[id]=true;updateHUD();openShop();toast(`${it.icon} "${it.name}" 구매!`,'ok');
}

// ══════ 설정 ══════
function openSettings(){renderSettingsOv();}
function renderSettingsOv(){
  const html=CUSTS.map((c,ci)=>{
    const mk=(state,lbl,cls)=>`<div class="img-upload-box" onclick="document.getElementById('fin-${c.id}-${state}').click()">
      <img class="img-thumb" id="th-${c.id}-${state}" src="${c.imgs[state]||c.defImgs[state]}">
      <span class="img-lbl ${cls}">${lbl}</span>
      <input class="hidden-file" id="fin-${c.id}-${state}" type="file" accept="image/*" onchange="loadImg('${c.id}','${state}',this)">
    </div>`;
    return `<div class="cust-entry" id="ce-${c.id}">
      <div class="cust-entry-imgs">${mk('normal','기본','normal')}${mk('happy','기쁨','happy')}${mk('angry','화남','angry')}</div>
      <div class="cust-entry-info">
        <input class="cust-name-input" value="${c.name}" oninput="CUSTS.find(x=>x.id==='${c.id}').name=this.value">
        <div class="cust-btns">
          <button class="cust-use-btn ${c.active?'active':'inactive'}" onclick="toggleActive('${c.id}')">${c.active?'✓ 사용중':'사용 안함'}</button>
          ${CUSTS.length>1?`<button class="cust-del-btn" onclick="delCust('${c.id}')">삭제</button>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
  showOv(`<div class="ov-hd"><div class="ov-title">⚙️ 설정</div></div>
    <div class="ov-body">
      <div class="setting-section">
        <div class="setting-title">👥 손님 캐릭터</div>
        <div class="cust-setting-grid">${html}</div>
        <br><button class="add-cust-btn" onclick="addCust()">+ 손님 추가</button>
      </div>
      <div class="btn-row"><button class="abtn brown" onclick="closeOv()">✓ 닫기</button></div>
    </div>`);
}
function loadImg(id,state,input){
  if(!input.files||!input.files[0])return;
  const r=new FileReader();
  r.onload=e=>{
    const c=CUSTS.find(x=>x.id===id);if(!c)return;
    c.imgs[state]=e.target.result;
    const th=document.getElementById(`th-${id}-${state}`);if(th)th.src=e.target.result;
    toast('📷 이미지 저장됨!','ok');
  };
  r.readAsDataURL(input.files[0]);
}
function toggleActive(id){
  const c=CUSTS.find(x=>x.id===id);if(c)c.active=!c.active;
  renderSettingsOv();
}
function delCust(id){
  if(CUSTS.length<=1)return;
  CUSTS=CUSTS.filter(x=>x.id!==id);renderSettingsOv();
}
function addCust(){
  const i=CUSTS.length%HAIR_COLORS.length;
  const id='c'+Date.now();
  const h=HAIR_COLORS[i],s=SKIN_COLORS[i%SKIN_COLORS.length];
  CUSTS.push({id,name:'새 손님',imgs:{normal:null,happy:null,angry:null},
    defImgs:{normal:makeSVG(h,s,'normal'),happy:makeSVG(h,s,'happy'),angry:makeSVG(h,s,'angry')},active:true});
  renderSettingsOv();toast('👤 손님 추가됨!','ok');
}

// ══════ 유틸 ══════
function showOv(html){document.getElementById('ov-card').innerHTML=html;document.getElementById('overlay').classList.add('show');}
function closeOv(){document.getElementById('overlay').classList.remove('show');}
function updateHUD(){
  document.getElementById('h-money').textContent=G.money.toLocaleString();
  document.getElementById('h-happy').textContent=G.happy;
}
let _tt=null;
function toast(msg,cls){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='show '+(cls||'');
  if(_tt)clearTimeout(_tt);
  _tt=setTimeout(()=>el.className='',2400);
}
</script>

<script>
// ── Service Worker 등록 (PWA) ──
if('serviceWorker' in navigator){
  const swCode=`
    const CACHE='dango-v1';
    const ASSETS=['/'];
    self.addEventListener('install',e=>{
      e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)));
      self.skipWaiting();
    });
    self.addEventListener('activate',e=>{
      e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
      self.clients.claim();
    });
    self.addEventListener('fetch',e=>{
      e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));
    });
  `;
  const blob=new Blob([swCode],{type:'application/javascript'});
  const url=URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).then(()=>{
    console.log('🍡 당고집 PWA 등록 완료');
  }).catch(e=>console.log('SW 등록 실패(로컬파일에서는 정상):',e));
}

// ── iOS 홈화면 추가 안내 ──
window.addEventListener('load',()=>{
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone=window.navigator.standalone;
  const shown=sessionStorage.getItem('pwa-hint');
  if(isIOS&&!isStandalone&&!shown){
    sessionStorage.setItem('pwa-hint','1');
    setTimeout(()=>{
      const el=document.createElement('div');
      el.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#6a4228;color:#fff4e8;padding:10px 16px;border-radius:14px;font-size:12px;font-family:Jua,sans-serif;z-index:9999;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.3);max-width:260px;line-height:1.6;';
      el.innerHTML='📲 홈 화면에 추가하면<br>앱처럼 사용할 수 있어요!<br><span style="font-size:10px;opacity:.7;">하단 공유버튼 → 홈 화면에 추가</span>';
      el.onclick=()=>el.remove();
      document.body.appendChild(el);
      setTimeout(()=>el&&el.remove(),5000);
    },2000);
  }
});
</script>
