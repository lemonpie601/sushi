<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🍣 스시야 이치방</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f0e6d4;
  --wall:#b8714a;--wall2:#9a5530;--wall3:#7a3a18;
  --floor:#8b6040;
  --counter:#6a4228;--counter2:#4a2e18;--counter3:#3a2010;
  --rail:#c8a050;--rail2:#a07830;
  --cream:#fdf6e8;--cream2:#ede0c4;--cream3:#d8c8a8;
  --sage:#6a9d58;--sage2:#4a7d38;--sage3:#2a5d18;
  --warm:#c86840;--warm2:#a04820;
  --red:#c03030;--gold:#c89820;
  --text:#2a1a08;--text2:#5a3a18;--text3:#9a7850;
  --white:#fffdf5;
  --shadow:rgba(60,30,5,.2);
}
html,body{height:100%;overflow:hidden;}
body{
  font-family:'Noto Sans KR',sans-serif;
  color:var(--text);
  display:flex;flex-direction:column;
  height:100dvh;
  background:var(--bg);
}

/* ── 헤더 ── */
#hdr{
  background:var(--wall3);
  padding:0 12px;
  height:44px;min-height:44px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
  gap:6px;
}
.hdr-shop{font-family:'Jua',sans-serif;font-size:14px;color:var(--cream);}
.hdr-chips{display:flex;gap:5px;align-items:center;}
.hchip{
  font-size:11px;color:var(--cream);
  background:rgba(255,255,255,.15);
  border-radius:14px;padding:3px 8px;
  display:flex;align-items:center;gap:3px;
}
.hchip b{font-family:'Jua',sans-serif;font-size:13px;}
#hdr-timer{
  font-family:'Jua',sans-serif;font-size:15px;color:var(--cream);
  background:rgba(0,0,0,.25);border-radius:14px;padding:3px 10px;
  flex-shrink:0;
}
#hdr-timer.urg{color:#ff8888;animation:urg .4s ease infinite alternate;}
@keyframes urg{from{opacity:.6}to{opacity:1}}

/* ── 레스토랑 (위) ── */
#restaurant{
  flex:1;
  display:flex;flex-direction:column;
  overflow:hidden;
  min-height:0;
}

/* 뒷벽 */
#back-wall{
  flex-shrink:0;
  height:22%;min-height:50px;
  background:linear-gradient(180deg,#b87050 0%,#a06040 100%);
  border-bottom:3px solid var(--wall3);
  display:flex;align-items:center;justify-content:center;
}
.menu-sign{
  font-family:'Jua',sans-serif;font-size:11px;
  background:var(--wall3);color:var(--gold);
  padding:4px 14px;border-radius:3px;
  border:1px solid var(--gold);letter-spacing:.06em;
}

/* 손님 영역 */
#cust-row{
  flex:1;min-height:0;
  display:flex;align-items:flex-end;justify-content:space-around;
  padding:0 2%;
  position:relative;
}
.seat{
  display:flex;flex-direction:column;align-items:center;
  width:31%;max-width:110px;
  position:relative;
  flex-shrink:0;
}
/* 말풍선 */
.bubble{
  position:absolute;
  bottom:calc(100% - 4px);
  left:50%;transform:translateX(-50%);
  background:var(--white);
  border:2px solid var(--cream2);
  border-radius:10px;
  padding:7px 9px;
  min-width:105px;max-width:140px;
  box-shadow:0 3px 10px var(--shadow);
  z-index:20;
  transition:opacity .25s;
  font-size:10px;
}
.bubble.hidden{opacity:0;pointer-events:none;}
.bubble::after{
  content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);
  border:6px solid transparent;border-top-color:var(--cream2);
}
.bubble::before{
  content:'';position:absolute;top:100%;margin-top:-2px;left:50%;transform:translateX(-50%);
  border:6px solid transparent;border-top-color:var(--white);z-index:1;
}
.bubble.eating{background:#edfce8;border-color:#8fcc78;}
.bubble.eating::after{border-top-color:#8fcc78;}
.bubble.eating::before{border-top-color:#edfce8;}
.bubble.angry{background:#fce8e8;border-color:#cc8080;}
.bubble.angry::after{border-top-color:#cc8080;}
.bubble.angry::before{border-top-color:#fce8e8;}
.bubble.wait{animation:bfloat 2s ease-in-out infinite alternate;}
@keyframes bfloat{from{transform:translateX(-50%) translateY(0);}to{transform:translateX(-50%) translateY(-4px);}}
/* 말풍선 내용 */
.b-title{font-family:'Jua',sans-serif;font-size:12px;color:var(--text);margin-bottom:5px;}
.b-row{display:flex;align-items:flex-start;gap:4px;margin-bottom:3px;}
.b-lbl{font-size:8px;font-weight:700;color:var(--warm2);min-width:20px;padding-top:1px;letter-spacing:.03em;}
.b-val{font-size:11px;color:var(--text2);line-height:1.4;}
.b-ings{display:flex;flex-direction:column;gap:2px;}
.b-ing{display:flex;align-items:center;gap:3px;}
.b-ing-i{font-size:15px;line-height:1;}
.b-ing-n{font-size:10px;font-weight:700;color:var(--text);}
.b-ing-c{font-size:10px;font-weight:700;color:var(--red);}

/* 손님 아바타 */
.cust-img-wrap{
  position:relative;cursor:pointer;
  width:100%;display:flex;justify-content:center;
}
.cust-img{
  width:68px;height:86px;
  object-fit:cover;object-position:top center;
  border-radius:8px 8px 0 0;
  display:block;
  filter:drop-shadow(0 3px 6px rgba(0,0,0,.3));
  transition:filter .3s;
}
.cust-img.eating{filter:drop-shadow(0 3px 6px rgba(0,0,0,.3)) brightness(1.1) hue-rotate(80deg);}
.cust-img.angry{filter:drop-shadow(0 3px 6px rgba(0,0,0,.3)) saturate(1.8) hue-rotate(-20deg) brightness(.9);}
.upload-hint{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.55);color:#fff;
  font-size:8px;padding:2px 6px;border-radius:0 0 4px 4px;
  opacity:0;transition:opacity .2s;white-space:nowrap;
}
.cust-img-wrap:hover .upload-hint{opacity:1;}
input.file-in{display:none;}

/* 타이머 바 */
.cust-tbar-bg{width:90%;height:5px;background:rgba(0,0,0,.15);border-radius:3px;margin-top:2px;overflow:hidden;}
.cust-tbar{height:5px;border-radius:3px;transition:width .4s,background .3s;background:var(--sage);}

/* ── 레일 ── */
#rail{
  height:50px;flex-shrink:0;
  background:var(--rail);
  border-top:3px solid var(--rail2);
  border-bottom:3px solid var(--counter2);
  position:relative;overflow:hidden;
}
#rail::before,#rail::after{
  content:'';position:absolute;top:0;bottom:0;width:24px;z-index:3;pointer-events:none;
}
#rail::before{left:0;background:linear-gradient(90deg,var(--rail),transparent);}
#rail::after{right:0;background:linear-gradient(-90deg,var(--rail),transparent);}
.rail-deco{position:absolute;top:50%;transform:translateY(-50%);left:0;right:0;height:2px;background:rgba(255,255,255,.18);pointer-events:none;}
#rail-track{position:absolute;inset:0;}
.rsushi{
  position:absolute;top:3px;
  display:flex;flex-direction:column;align-items:center;gap:1px;
  cursor:pointer;z-index:2;
  transition:transform .1s;
}
.rsushi:hover{transform:scale(1.18) translateY(-2px);}
.rsushi:active{transform:scale(1.05);}
.rplate{
  width:42px;height:42px;border-radius:50%;
  background:var(--white);border:2px solid var(--cream3);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
  box-shadow:0 2px 6px rgba(0,0,0,.2);
}
.rplate.match{
  border-color:var(--sage);
  box-shadow:0 2px 12px rgba(90,141,58,.6);
  animation:rglow .7s ease-in-out infinite alternate;
}
@keyframes rglow{from{box-shadow:0 2px 8px rgba(90,141,58,.4);}to{box-shadow:0 2px 16px rgba(90,141,58,.8);}}
.rlabel{font-size:7px;color:var(--counter2);font-weight:700;white-space:nowrap;}

/* ── 제작대 ── */
#bench{
  flex-shrink:0;
  background:var(--counter);
  border-top:4px solid var(--counter2);
  padding:6px 8px 8px;
  overflow-y:auto;
  /* 모바일: 스크롤 허용 */
}
.bench-inner{
  background:var(--counter2);
  border-radius:8px;
  border:2px solid var(--counter3);
  padding:7px 8px 6px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

/* 현재 만드는 초밥 미리보기 */
#craft-bar{
  display:flex;align-items:center;gap:6px;
  background:rgba(0,0,0,.2);border-radius:6px;
  padding:5px 8px;min-height:34px;flex-wrap:wrap;
}
.craft-icon{font-size:18px;line-height:1;}
.craft-empty-msg{font-size:10px;color:rgba(255,255,255,.35);}
#serve-row{display:flex;gap:6px;margin-top:2px;}
#serve-btn{
  flex:1;font-family:'Jua',sans-serif;font-size:14px;
  padding:9px 8px;border:none;border-radius:8px;
  background:rgba(255,255,255,.12);color:rgba(255,255,255,.3);
  cursor:not-allowed;transition:all .18s;letter-spacing:.05em;
}
#serve-btn.on{
  background:var(--sage);color:#fff;cursor:pointer;
  box-shadow:0 3px 0 var(--sage3),0 4px 12px rgba(42,93,24,.4);
}
#serve-btn.on:active{transform:translateY(2px);box-shadow:0 1px 0 var(--sage3);}
#rst-btn{
  font-size:18px;padding:8px 12px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  border-radius:8px;color:rgba(255,255,255,.45);cursor:pointer;
}
#rst-btn:active{background:rgba(255,255,255,.18);}

/* ── 섹션 라벨 ── */
.bench-label{
  font-size:9px;font-weight:700;color:rgba(255,255,255,.5);
  letter-spacing:.08em;text-transform:uppercase;
  margin-bottom:3px;
}

/* ── 선택 버튼들 ── */
.pick-row{display:flex;gap:5px;flex-wrap:wrap;}
.pbtn{
  display:flex;flex-direction:column;align-items:center;gap:1px;
  padding:5px 6px;min-width:48px;
  background:rgba(255,255,255,.1);
  border:1.5px solid rgba(255,255,255,.18);
  border-radius:8px;cursor:pointer;
  transition:all .1s;
  font-family:'Noto Sans KR',sans-serif;
  -webkit-tap-highlight-color:transparent;
}
.pbtn:active{transform:scale(.93);}
.pbtn.sel{background:var(--warm);border-color:var(--warm2);}
.pbtn .pi{font-size:18px;line-height:1.1;}
.pbtn .pn{font-size:8px;color:rgba(255,255,255,.65);}
.pbtn.sel .pn{color:#fff;font-weight:700;}
.pbtn{position:relative;}
.pcnt{
  position:absolute;top:-5px;right:-5px;
  width:16px;height:16px;border-radius:50%;
  background:var(--red);color:#fff;font-size:8px;font-weight:700;
  display:none;align-items:center;justify-content:center;
}
.pbtn.hascnt .pcnt{display:flex;}
.prmv{
  position:absolute;top:-5px;left:-5px;
  width:15px;height:15px;border-radius:50%;
  background:rgba(180,40,40,.85);color:#fff;
  font-size:8px;font-weight:700;cursor:pointer;
  display:none;align-items:center;justify-content:center;
}
.pbtn.hascnt .prmv{display:flex;}

/* ── 클리어/상점 ── */
#overlay{
  display:none;position:fixed;inset:0;
  background:rgba(42,20,5,.88);z-index:100;
  align-items:center;justify-content:center;padding:16px;
}
#overlay.show{display:flex;}
.ov-card{
  background:var(--cream);border-radius:18px;
  border:3px solid var(--cream2);
  width:100%;max-width:360px;
  box-shadow:0 8px 32px rgba(60,20,0,.4);
  overflow:hidden;
}
.ov-head{
  background:var(--wall3);padding:12px 16px;
  display:flex;align-items:center;justify-content:space-between;
}
.ov-title{font-family:'Jua',sans-serif;font-size:18px;color:var(--cream);}
.ov-sub{font-size:12px;color:rgba(253,246,232,.7);}
.ov-body{padding:14px 16px;max-height:65vh;overflow-y:auto;}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px;}
.stat-box{background:var(--cream2);border-radius:10px;padding:10px;border:1.5px solid var(--cream3);}
.stat-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;}
.stat-val{font-family:'Jua',sans-serif;font-size:20px;color:var(--text);margin-top:2px;}
.stars{font-size:28px;text-align:center;margin-bottom:10px;}
.btn-row{display:flex;gap:8px;justify-content:center;padding:0 0 4px;}
.abtn{font-family:'Jua',sans-serif;font-size:13px;padding:10px 22px;border:none;border-radius:50px;cursor:pointer;}
.abtn.sage{background:var(--sage);color:#fff;box-shadow:0 3px 0 var(--sage3);}
.abtn.warm{background:var(--warm);color:#fff;box-shadow:0 3px 0 var(--warm2);}
/* 상점 아이템 */
.shop-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;}
.shop-item{background:var(--white);border:2px solid var(--cream2);border-radius:10px;padding:9px;}
.shop-item.owned{border-color:var(--sage2);}
.si-icon{font-size:22px;margin-bottom:3px;}
.si-name{font-size:11px;font-weight:700;color:var(--text);margin-bottom:2px;}
.si-desc{font-size:9px;color:var(--text3);line-height:1.5;margin-bottom:6px;}
.si-btn{font-family:'Jua',sans-serif;font-size:10px;padding:5px 8px;border:none;border-radius:6px;cursor:pointer;width:100%;}
.si-btn.buy{background:var(--sage);color:#fff;}
.si-btn.cant{background:var(--cream2);color:var(--text3);cursor:not-allowed;}
.si-btn.have{background:#d1fae5;color:var(--sage2);cursor:default;}

/* 토스트 */
#toast{
  position:fixed;top:50px;left:50%;transform:translateX(-50%);
  font-size:11px;font-weight:700;padding:6px 14px;border-radius:16px;
  background:var(--wall3);color:var(--cream);
  z-index:200;opacity:0;transition:opacity .2s;pointer-events:none;
  white-space:nowrap;box-shadow:0 3px 10px rgba(0,0,0,.3);
}
#toast.show{opacity:1;}
#toast.ok{background:var(--sage2);}
#toast.ng{background:var(--red);}
#toast.gold{background:var(--gold);color:var(--text);}
</style>
</head>
<body>

<!-- 헤더 -->
<div id="hdr">
  <div class="hdr-shop">🍣 이치방</div>
  <div class="hdr-chips">
    <div class="hchip">📅 <b id="h-day">Day1</b></div>
    <div class="hchip">💰 <b id="h-money">0</b>원</div>
    <div class="hchip">😊 <b id="h-happy">0</b></div>
  </div>
  <div id="hdr-timer">1:00</div>
</div>

<!-- 레스토랑 -->
<div id="restaurant">
  <!-- 뒷벽 -->
  <div id="back-wall">
    <div class="menu-sign">🍣 スシ屋 一番 · 오마카세</div>
  </div>

  <!-- 손님 3명 -->
  <div id="cust-row">
    <div class="seat" id="seat-0">
      <div class="bubble hidden" id="bub-0"></div>
      <div class="cust-img-wrap" onclick="triggerUp(0)">
        <img class="cust-img" id="cimg-0" src="" alt="">
        <div class="upload-hint">📷 이미지 변경</div>
        <input class="file-in" id="fin-0" type="file" accept="image/*" onchange="loadImg(0,this)">
      </div>
      <div class="cust-tbar-bg"><div class="cust-tbar" id="ctbar-0"></div></div>
    </div>
    <div class="seat" id="seat-1">
      <div class="bubble hidden" id="bub-1"></div>
      <div class="cust-img-wrap" onclick="triggerUp(1)">
        <img class="cust-img" id="cimg-1" src="" alt="">
        <div class="upload-hint">📷 이미지 변경</div>
        <input class="file-in" id="fin-1" type="file" accept="image/*" onchange="loadImg(1,this)">
      </div>
      <div class="cust-tbar-bg"><div class="cust-tbar" id="ctbar-1"></div></div>
    </div>
    <div class="seat" id="seat-2">
      <div class="bubble hidden" id="bub-2"></div>
      <div class="cust-img-wrap" onclick="triggerUp(2)">
        <img class="cust-img" id="cimg-2" src="" alt="">
        <div class="upload-hint">📷 이미지 변경</div>
        <input class="file-in" id="fin-2" type="file" accept="image/*" onchange="loadImg(2,this)">
      </div>
      <div class="cust-tbar-bg"><div class="cust-tbar" id="ctbar-2"></div></div>
    </div>
  </div>

  <!-- 레일 -->
  <div id="rail">
    <div class="rail-deco"></div>
    <div id="rail-track"></div>
  </div>
</div>

<!-- 제작대 -->
<div id="bench">
  <div class="bench-inner">

    <!-- 미리보기 + 서빙 -->
    <div id="craft-bar"><span class="craft-empty-msg">재료를 선택하면 여기에 표시돼요</span></div>
    <div id="serve-row">
      <button id="serve-btn" onclick="doServe()">🍱 레일에 올리기!</button>
      <button id="rst-btn" onclick="resetCraft()">🗑</button>
    </div>

    <!-- 밥 -->
    <div>
      <div class="bench-label">🍚 밥 종류</div>
      <div class="pick-row" id="rice-row">
        <div class="pbtn" onclick="setRice('white')" data-r="white"><span class="pi">🍚</span><span class="pn">흰밥</span></div>
        <div class="pbtn" onclick="setRice('vinegar')" data-r="vinegar"><span class="pi">🟡</span><span class="pn">식초밥</span></div>
        <div class="pbtn" onclick="setRice('black')" data-r="black"><span class="pi">⚫</span><span class="pn">흑초밥</span></div>
        <div class="pbtn" onclick="setRice('none')" data-r="none"><span class="pi">🫙</span><span class="pn">군함</span></div>
      </div>
    </div>

    <!-- 재료 -->
    <div>
      <div class="bench-label">🐟 재료 <span id="ing-lbl" style="color:rgba(255,255,255,.35);font-weight:400;text-transform:none;letter-spacing:0;">(최대 3개)</span></div>
      <div class="pick-row" id="ing-row"></div>
    </div>

    <!-- 소스 -->
    <div>
      <div class="bench-label">🫙 소스</div>
      <div class="pick-row" id="sauce-row">
        <div class="pbtn" onclick="setSauce('soy')" data-s="soy"><span class="pi">🫙</span><span class="pn">간장</span></div>
        <div class="pbtn" onclick="setSauce('wasabi')" data-s="wasabi"><span class="pi">💚</span><span class="pn">와사비</span></div>
        <div class="pbtn" onclick="setSauce('ponzu')" data-s="ponzu"><span class="pi">🍋</span><span class="pn">폰즈</span></div>
        <div class="pbtn" onclick="setSauce('spicy')" data-s="spicy"><span class="pi">🌶️</span><span class="pn">스파이시</span></div>
        <div class="pbtn" onclick="setSauce('mayo')" data-s="mayo"><span class="pi">🥛</span><span class="pn">마요</span></div>
        <div class="pbtn" onclick="setSauce('none')" data-s="none"><span class="pi">✖️</span><span class="pn">없음</span></div>
      </div>
    </div>

  </div>
</div>

<!-- 오버레이 (영업끝/상점) -->
<div id="overlay">
  <div class="ov-card" id="ov-card"></div>
</div>

<div id="toast"></div>

<script>
// ══════ 데이터 ══════
const RICE={white:{l:'흰밥',i:'🍚'},vinegar:{l:'식초밥',i:'🟡'},black:{l:'흑초밥',i:'⚫'},none:{l:'군함',i:'🫙'}};
const SAUCE_D={soy:{l:'간장',i:'🫙'},wasabi:{l:'와사비',i:'💚'},ponzu:{l:'폰즈',i:'🍋'},spicy:{l:'스파이시',i:'🌶️'},mayo:{l:'마요',i:'🥛'},none:{l:'없음',i:'✖️'}};
const INGS=[
  {id:'salmon',i:'🐟',n:'연어'},{id:'tuna',i:'🔴',n:'참치'},{id:'shrimp',i:'🦐',n:'새우'},
  {id:'eel',i:'🟫',n:'장어'},{id:'scallop',i:'⚪',n:'관자'},{id:'egg',i:'🟡',n:'계란'},
  {id:'crab',i:'🦀',n:'게살'},{id:'sea_urchin',i:'🟠',n:'성게'},{id:'salmon_roe',i:'🔶',n:'연어알'},
  {id:'avocado',i:'🥑',n:'아보카도'},{id:'squid',i:'🦑',n:'오징어'},{id:'octopus',i:'🐙',n:'문어'},
];
const PRICE={salmon:500,tuna:600,shrimp:400,eel:700,scallop:800,egg:200,crab:600,sea_urchin:1000,salmon_roe:900,avocado:300,squid:350,octopus:450};
const MENUS=[
  {n:'연어',    r:'white',   i:{salmon:2},                s:'soy',   e:'😊',base:3000},
  {n:'참치',    r:'vinegar', i:{tuna:2},                  s:'wasabi',e:'😋',base:3200},
  {n:'새우',    r:'white',   i:{shrimp:2},                s:'soy',   e:'😄',base:2800},
  {n:'계란',    r:'white',   i:{egg:2},                   s:'none',  e:'😃',base:2400},
  {n:'장어',    r:'black',   i:{eel:2},                   s:'soy',   e:'🤩',base:3600},
  {n:'연어아보', r:'vinegar', i:{salmon:1,avocado:1},     s:'ponzu', e:'😍',base:4000},
  {n:'게살군함', r:'none',    i:{crab:2},                 s:'mayo',  e:'🥰',base:3400},
  {n:'성게군함', r:'none',    i:{sea_urchin:2},           s:'soy',   e:'😲',base:5000},
  {n:'연어알군함',r:'none',   i:{salmon_roe:2},           s:'soy',   e:'😯',base:4500},
  {n:'관자',    r:'black',   i:{scallop:2},               s:'ponzu', e:'🧐',base:4800},
  {n:'해물모둠', r:'vinegar', i:{tuna:1,salmon:1,shrimp:1},s:'spicy',e:'🤑',base:6000},
  {n:'오마카세', r:'vinegar', i:{tuna:1,sea_urchin:1,salmon_roe:1},s:'ponzu',e:'👑',base:8000},
];
const SHOP=[
  {id:'tip',  icon:'💸',name:'단골손님',  desc:'서빙 성공 시 +500원 팁',    price:5000},
  {id:'timer',icon:'⏰',name:'느긋한손님',desc:'손님 대기 시간 +8초',       price:8000},
  {id:'combo',icon:'🔥',name:'콤보보너스',desc:'3콤보마다 +2,000원',        price:12000},
  {id:'hint', icon:'💡',name:'주문 강조', desc:'레일에서 주문 일치 초밥 빛남',price:7000},
  {id:'slot', icon:'🪑',name:'좌석 확장', desc:'레일 속도 20% 감소',        price:9000},
];

// ══════ 기본 SVG 아바타 (인코딩된 SVG) ══════
function makeSVG(col,smile){
  const s=`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 68 86'><rect width='68' height='86' fill='%23${col.slice(1)}' rx='8'/><ellipse cx='34' cy='26' rx='18' ry='20' fill='%23fcd9b0'/><ellipse cx='26' cy='25' rx='3' ry='3.5' fill='white'/><ellipse cx='42' cy='25' rx='3' ry='3.5' fill='white'/><circle cx='26.5' cy='25.5' r='2' fill='%23333'/><circle cx='42.5' cy='25.5' r='2' fill='%23333'/><path d='M${smile}' stroke='%23a06040' stroke-width='2' fill='none' stroke-linecap='round'/><rect x='16' y='46' width='36' height='40' rx='6' fill='%23${col.slice(1)}' opacity='.9'/></svg>`;
  return 'data:image/svg+xml,'+s;
}
const DEF_IMGS=[
  makeSVG('#5878d0','28 36 Q34 41 40 36'),
  makeSVG('#d05878','28 36 Q34 42 40 36'),
  makeSVG('#50a870','28 36 Q34 41 40 36'),
];

// ══════ 상태 ══════
const G={
  day:1, money:0, happy:0, angry:0, combo:0, bestCombo:0,
  total:0, correct:0,
  sec:60, tint:null,
  custs:[null,null,null], ctimers:[null,null,null],
  buffs:{tip:false,timer:false,combo:false,hint:false,slot:false},
  rail:[], rafId:null,
  rice:null, ings:{}, sauce:null,
  dayMoney:0, dayHappy:0,
};
const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;

// ══════ 초기화 ══════
window.onload=()=>{
  buildIngRow();
  [0,1,2].forEach(s=>{ document.getElementById('cimg-'+s).src=DEF_IMGS[s]; });
  startDay();
};

function startDay(){
  G.sec=Math.max(40,60-G.day*3+3); // Day1=60, Day2=57...
  G.dayMoney=0; G.dayHappy=0; G.total=0; G.correct=0; G.combo=0;
  G.rail=[];
  document.getElementById('h-day').textContent='Day'+G.day;
  document.getElementById('hdr-timer').classList.remove('urg');
  G.tint=setInterval(tick,1000);
  startRail();
  [0,1,2].forEach(s=>setTimeout(()=>spawn(s),(s+1)*1200));
  updateHUD();
  renderCraft();
}

function tick(){
  G.sec--;
  const m=Math.floor(G.sec/60),s=G.sec%60;
  document.getElementById('hdr-timer').textContent=m+':'+(s<10?'0':'')+s;
  if(G.sec<=15)document.getElementById('hdr-timer').classList.add('urg');
  if(G.sec<=0){clearInterval(G.tint);endDay();}
}

// ══════ 레일 ══════
const SPEED=0.5;
function startRail(){
  cancelAnimationFrame(G.rafId);
  const track=document.getElementById('rail-track');
  function frame(){
    const spd=G.buffs.slot?SPEED*0.75:SPEED;
    G.rail.forEach(r=>{ r.x-=spd; });
    G.rail=G.rail.filter(r=>r.x>-60);
    renderRail();
    G.rafId=requestAnimationFrame(frame);
  }
  G.rafId=requestAnimationFrame(frame);
}
function renderRail(){
  const track=document.getElementById('rail-track');
  track.innerHTML='';
  G.rail.forEach(item=>{
    // 매칭 체크
    const matches=G.buffs.hint&&G.custs.some(c=>c&&sushiMatch(item,c));
    const el=document.createElement('div');
    el.className='rsushi';
    el.style.left=item.x+'px';
    const ingIcons=Object.entries(item.ings).map(([id])=>INGS.find(x=>x.id===id)?.i||'').join('');
    el.innerHTML=`<div class="rplate${matches?' match':''}">${ingIcons||RICE[item.rice]?.i||'🍣'}</div><div class="rlabel">${item.name}</div>`;
    el.onclick=()=>serveItem(item.id);
    track.appendChild(el);
  });
}

// ══════ 손님 ══════
function getTL(){return G.buffs.timer?30000:22000;}
function getLvMenu(){
  if(G.day<=2)return MENUS.slice(0,5);
  if(G.day<=4)return MENUS.slice(0,9);
  return MENUS;
}

function spawn(seat){
  if(G.sec<=0)return;
  const menu=getLvMenu()[rnd(0,getLvMenu().length-1)];
  G.custs[seat]={menu,tl:getTL(),maxTl:getTL()};
  showBubble(seat,'order',menu);
  if(G.ctimers[seat])clearInterval(G.ctimers[seat]);
  G.ctimers[seat]=setInterval(()=>{
    const c=G.custs[seat];if(!c)return;
    c.tl-=200;
    const pct=Math.max(0,c.tl/c.maxTl*100);
    const bc=pct>55?'var(--sage)':pct>25?'var(--warm)':'var(--red)';
    const bar=document.getElementById('ctbar-'+seat);
    if(bar){bar.style.width=pct+'%';bar.style.background=bc;}
    if(c.tl<=0){clearInterval(G.ctimers[seat]);loseC(seat);}
  },200);
}

function loseC(seat){
  G.custs[seat]=null;
  G.angry++;G.combo=0;
  showBubble(seat,'angry');
  const img=document.getElementById('cimg-'+seat);
  if(img)img.className='cust-img angry';
  updateHUD();
  setTimeout(()=>{
    showBubble(seat,'hidden');
    const i2=document.getElementById('cimg-'+seat);
    if(i2)i2.className='cust-img';
    const bar=document.getElementById('ctbar-'+seat);
    if(bar){bar.style.width='100%';bar.style.background='var(--sage)';}
    if(G.sec>0)setTimeout(()=>spawn(seat),1400);
  },1600);
  toast('😤 손님이 기다리다 가셨어요!','ng');
}

// ══════ 말풍선 ══════
function showBubble(seat,type,menu){
  const el=document.getElementById('bub-'+seat);
  el.className='bubble';
  if(type==='hidden'){el.classList.add('hidden');el.innerHTML='';return;}
  if(type==='eating'){
    el.classList.add('eating');
    el.innerHTML='<div style="font-size:20px;text-align:center;">😋</div><div style="font-size:10px;text-align:center;color:#3a7a28;">맛있어요!</div>';
    return;
  }
  if(type==='angry'){
    el.classList.add('angry');
    el.innerHTML='<div style="font-size:20px;text-align:center;">😡</div><div style="font-size:10px;text-align:center;color:#a03030;">너무 오래 기다렸어요!</div>';
    return;
  }
  if(type==='order'&&menu){
    el.classList.add('wait');
    const ingRows=Object.entries(menu.i).map(([id,cnt])=>{
      const ing=INGS.find(x=>x.id===id);
      return ing?`<div class="b-ing"><span class="b-ing-i">${ing.i}</span><span class="b-ing-n">${ing.n}</span><span class="b-ing-c">×${cnt}</span></div>`:'';
    }).join('');
    const ri=RICE[menu.r],si=SAUCE_D[menu.s];
    el.innerHTML=`
      <div class="b-title">${menu.n} 주세요!</div>
      <div class="b-row"><span class="b-lbl">밥</span><span class="b-val">${ri.i} ${ri.l}</span></div>
      <div class="b-row"><span class="b-lbl">재료</span><div class="b-ings">${ingRows}</div></div>
      <div class="b-row"><span class="b-lbl">소스</span><span class="b-val">${si.i} ${si.l}</span></div>`;
  }
}

// ══════ 서빙 (레일 클릭) ══════
function serveItem(id){
  const idx=G.rail.findIndex(x=>x.id===id);
  if(idx<0)return;
  const item=G.rail[idx];

  // 일치하는 손님 찾기
  let matched=-1;
  for(let s=0;s<3;s++){
    if(G.custs[s]&&sushiMatch(item,G.custs[s])){matched=s;break;}
  }

  G.rail.splice(idx,1);

  if(matched>=0){
    const c=G.custs[matched];
    clearInterval(G.ctimers[matched]);
    G.custs[matched]=null;
    G.correct++;G.total++;
    G.combo++;if(G.combo>G.bestCombo)G.bestCombo=G.combo;
    let price=c.menu.base;
    Object.entries(item.ings).forEach(([id,cnt])=>{price+=(PRICE[id]||0)*cnt;});
    if(G.buffs.tip)price+=500;
    if(G.buffs.combo&&G.combo%3===0){price+=2000;toast(`🔥 ${G.combo}콤보! +2,000원!`,'gold');}
    G.money+=price;G.dayMoney+=price;G.happy++;G.dayHappy++;
    showBubble(matched,'eating');
    const img=document.getElementById('cimg-'+matched);
    if(img)img.className='cust-img eating';
    const bar=document.getElementById('ctbar-'+matched);
    if(bar){bar.style.width='100%';bar.style.background='var(--sage)';}
    updateHUD();
    toast(`${c.menu.e} 완벽! +${price.toLocaleString()}원 ✨`,'ok');
    // 레벨업
    if(G.happy>0&&G.happy%8===0){
      G.day=Math.min(G.day+1,10);
      document.getElementById('h-day').textContent='Day'+G.day;
      toast(`🎉 레벨업! Day${G.day}`,'gold');
    }
    setTimeout(()=>{
      showBubble(matched,'hidden');
      const i2=document.getElementById('cimg-'+matched);
      if(i2)i2.className='cust-img';
      if(G.sec>0)setTimeout(()=>spawn(matched),1200);
    },1800);
  } else {
    toast('❓ 아무도 이 초밥을 주문하지 않았어요','ng');
    G.total++;
  }
}

function sushiMatch(item,cust){
  const m=cust.menu;
  if(item.rice!==m.r)return false;
  const ok=Object.keys(m.i),ik=Object.keys(item.ings);
  if(ok.length!==ik.length)return false;
  for(const k of ok){if((item.ings[k]||0)!==m.i[k])return false;}
  if(item.sauce!==m.s)return false;
  return true;
}

// ══════ 제작 ══════
function buildIngRow(){
  const row=document.getElementById('ing-row');row.innerHTML='';
  INGS.forEach(ing=>{
    const d=document.createElement('div');
    d.className='pbtn';d.id='ib-'+ing.id;
    d.innerHTML=`<span class="pi">${ing.i}</span><span class="pn">${ing.n}</span><span class="pcnt" id="ic-${ing.id}"></span><span class="prmv" id="ir-${ing.id}" onclick="rmIng('${ing.id}',event)">✕</span>`;
    d.onclick=()=>addIng(ing.id);
    row.appendChild(d);
  });
}
function setRice(r){
  G.rice=r;
  document.querySelectorAll('[data-r]').forEach(b=>b.classList.toggle('sel',b.dataset.r===r));
  renderCraft();checkReady();
}
function addIng(id){
  const tot=Object.values(G.ings).reduce((a,b)=>a+b,0);
  if(tot>=3)return;
  G.ings[id]=(G.ings[id]||0)+1;
  updateIngUI();renderCraft();checkReady();
}
function rmIng(id,e){
  e.stopPropagation();
  if(!G.ings[id])return;
  G.ings[id]--;if(!G.ings[id])delete G.ings[id];
  updateIngUI();renderCraft();checkReady();
}
function updateIngUI(){
  INGS.forEach(({id})=>{
    const cnt=G.ings[id]||0;
    const btn=document.getElementById('ib-'+id);
    const ci=document.getElementById('ic-'+id);
    const ri=document.getElementById('ir-'+id);
    if(ci){ci.textContent=cnt;ci.style.display=cnt?'flex':'none';}
    if(ri)ri.style.display=cnt?'flex':'none';
    if(btn)btn.classList.toggle('hascnt',cnt>0);
  });
  const tot=Object.values(G.ings).reduce((a,b)=>a+b,0);
  document.getElementById('ing-lbl').textContent=`(${tot}/3)`;
}
function setSauce(s){
  G.sauce=s;
  document.querySelectorAll('[data-s]').forEach(b=>b.classList.toggle('sel',b.dataset.s===s));
  renderCraft();checkReady();
}
function checkReady(){
  const ok=G.rice&&Object.keys(G.ings).length>0&&G.sauce;
  document.getElementById('serve-btn').className=ok?'on':'';
}
function renderCraft(){
  const bar=document.getElementById('craft-bar');
  const ri=G.rice?RICE[G.rice]:null;
  const ings=Object.entries(G.ings);
  const si=G.sauce?SAUCE_D[G.sauce]:null;
  if(!ri&&ings.length===0&&!si){
    bar.innerHTML='<span class="craft-empty-msg">재료를 선택하면 여기에 표시돼요</span>';
    return;
  }
  let h='';
  if(ri)h+=`<span class="craft-icon" title="${ri.l}">${ri.i}</span>`;
  ings.forEach(([id,cnt])=>{
    const ing=INGS.find(x=>x.id===id);
    if(ing)for(let i=0;i<cnt;i++)h+=`<span class="craft-icon">${ing.i}</span>`;
  });
  if(si)h+=`<span class="craft-icon" title="${si.l}">${si.i}</span>`;
  bar.innerHTML=h;
}
function doServe(){
  if(!G.rice||!G.sauce||Object.keys(G.ings).length===0)return;
  const ings=Object.entries(G.ings);
  const ingIcons=ings.map(([id])=>INGS.find(x=>x.id===id)?.i||'').join('');
  const name=ings.length===1?INGS.find(x=>x.id===ings[0][0])?.n||'초밥':ings.map(([id])=>INGS.find(x=>x.id===id)?.n||'').join('+');
  const track=document.getElementById('rail-track');
  G.rail.push({
    id:Date.now(),
    rice:G.rice,ings:{...G.ings},sauce:G.sauce,
    displayIcon:ingIcons||RICE[G.rice]?.i||'🍣',
    name,
    x:track.offsetWidth+60,
  });
  toast('🚂 레일에 올렸어요!','');
  resetCraft();
}
function resetCraft(){
  G.rice=null;G.ings={};G.sauce=null;
  document.querySelectorAll('[data-r],[data-s]').forEach(b=>b.classList.remove('sel'));
  updateIngUI();renderCraft();checkReady();
}

// ══════ 영업 마감 ══════
function endDay(){
  cancelAnimationFrame(G.rafId);
  [0,1,2].forEach(s=>{if(G.ctimers[s])clearInterval(G.ctimers[s]);});
  const acc=G.total?Math.round(G.correct/G.total*100):0;
  const stars=G.dayHappy>=8?'⭐⭐⭐':G.dayHappy>=4?'⭐⭐':'⭐';
  const card=document.getElementById('ov-card');
  card.innerHTML=`
    <div class="ov-head">
      <div class="ov-title">🍣 오늘 영업 종료!</div>
      <div class="ov-sub">Day ${G.day}</div>
    </div>
    <div class="ov-body">
      <div class="stars">${stars}</div>
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-lbl">오늘 수익</div><div class="stat-val">${G.dayMoney.toLocaleString()}원</div></div>
        <div class="stat-box"><div class="stat-lbl">만족 손님</div><div class="stat-val">${G.dayHappy}명</div></div>
        <div class="stat-box"><div class="stat-lbl">최고 콤보</div><div class="stat-val">${G.bestCombo}콤보</div></div>
        <div class="stat-box"><div class="stat-lbl">정확도</div><div class="stat-val">${acc}%</div></div>
      </div>
      <div class="btn-row">
        <button class="abtn sage" onclick="openShop()">🛒 상점</button>
        <button class="abtn warm" onclick="nextDay()">🌅 다음 날</button>
      </div>
    </div>`;
  document.getElementById('overlay').classList.add('show');
}

function nextDay(){
  G.day++;
  document.getElementById('overlay').classList.remove('show');
  G.rail=[];renderRail();
  [0,1,2].forEach(s=>{showBubble(s,'hidden');const i=document.getElementById('cimg-'+s);if(i)i.className='cust-img';const b=document.getElementById('ctbar-'+s);if(b){b.style.width='100%';b.style.background='var(--sage)';}});
  resetCraft();
  startDay();
}

// ══════ 상점 ══════
function openShop(){
  const card=document.getElementById('ov-card');
  const items=SHOP.map(it=>{
    const owned=G.buffs[it.id];
    const can=!owned&&G.money>=it.price;
    return `<div class="shop-item${owned?' owned':''}">
      <div class="si-icon">${it.icon}</div>
      <div class="si-name">${it.name}</div>
      <div class="si-desc">${it.desc}</div>
      <button class="si-btn ${owned?'have':can?'buy':'cant'}" onclick="buyItem('${it.id}')">
        ${owned?'✓ 보유':can?'💰 '+it.price.toLocaleString()+'원':'💸 '+it.price.toLocaleString()+'원'}
      </button>
    </div>`;
  }).join('');
  card.innerHTML=`
    <div class="ov-head">
      <div class="ov-title">🛒 상점</div>
      <div class="ov-sub">💰 ${G.money.toLocaleString()}원 보유</div>
    </div>
    <div class="ov-body">
      <div class="shop-grid">${items}</div>
      <div class="btn-row">
        <button class="abtn warm" onclick="closeShop()">← 돌아가기</button>
      </div>
    </div>`;
}
function buyItem(id){
  const it=SHOP.find(x=>x.id===id);
  if(!it||G.buffs[id]||G.money<it.price)return;
  G.money-=it.price;G.buffs[id]=true;
  updateHUD();openShop();
  toast(`${it.icon} "${it.name}" 구매 완료!`,'ok');
}
function closeShop(){endDay();}

// ══════ 이미지 업로드 ══════
function triggerUp(seat){document.getElementById('fin-'+seat).click();}
function loadImg(seat,input){
  if(!input.files||!input.files[0])return;
  const r=new FileReader();
  r.onload=e=>{document.getElementById('cimg-'+seat).src=e.target.result;toast('📷 이미지 변경 완료!','ok');};
  r.readAsDataURL(input.files[0]);
}

// ══════ HUD ══════
function updateHUD(){
  document.getElementById('h-money').textContent=G.money.toLocaleString();
  document.getElementById('h-happy').textContent=G.happy;
}
// ══════ 토스트 ══════
let _tt=null;
function toast(msg,cls){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='show '+(cls||'');
  if(_tt)clearTimeout(_tt);
  _tt=setTimeout(()=>el.className='',2400);
}
</script>
</body>
